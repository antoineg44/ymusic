<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Artistes - YMusic</title>
		<link rel="stylesheet" href="styles.css" />
		<style>
			.artists-page {
				max-width: 1100px;
				margin: 0 auto;
				padding: 24px;
			}

			.artists-head {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 12px;
				margin-bottom: 16px;
			}

			.artists-back {
				color: #bae6fd;
			}

			.artists-table-wrap {
				overflow-x: auto;
			}

			.artists-table {
				width: 100%;
				border-collapse: collapse;
			}

			.artists-table th,
			.artists-table td {
				text-align: left;
				border-bottom: 1px solid rgba(148, 163, 184, 0.2);
				padding: 10px;
			}

			.artist-name-button {
				border: 0;
				background: transparent;
				color: #7dd3fc;
				font-weight: 700;
				cursor: pointer;
				padding: 0;
				text-align: left;
			}

			.artist-name-button:hover {
				text-decoration: underline;
			}

			.artist-songs-panel {
				margin-top: 16px;
			}

			.artist-songs-panel.is-hidden {
				display: none;
			}

			.artists-head.is-hidden,
			.artists-table-wrap.is-hidden {
				display: none;
			}

			.song-play-button {
				border: 0;
				border-radius: 999px;
				padding: 6px 10px;
				cursor: pointer;
				background: #38bdf8;
				color: #082f49;
				font-weight: 700;
			}
		</style>
	</head>
	<body>
		<main class="artists-page">
			<section class="panel">
				<div class="artists-head">
					<div>
						<h1>Artistes en base</h1>
						<p id="artistsStatus" class="status">Chargement...</p>
					</div>
				</div>

				<div class="artists-table-wrap">
					<table class="artists-table" aria-label="Liste des artistes">
						<thead>
							<tr>
								<th>Artiste</th>
								<th>Nombre de musiques</th>
								<th>Vues internes</th>
							</tr>
						</thead>
						<tbody id="artistsBody"></tbody>
					</table>
				</div>

				<div id="artistSongsPanel" class="artist-songs-panel is-hidden">
					<div class="artists-head">
						<div>
							<h2 id="songsTitle">Musiques</h2>
							<p id="songsStatus" class="status"></p>
						</div>
						<button id="backToArtistsBtn" class="artists-back" type="button">Retour aux artistes</button>
					</div>
					<div class="artists-table-wrap">
						<table class="artists-table" aria-label="Musiques de l'artiste">
							<thead>
								<tr>
									<th>Titre</th>
									<th>Album</th>
									<th>Duree</th>
									<th>Vues internes</th>
									<th>Action</th>
								</tr>
							</thead>
							<tbody id="songsBody"></tbody>
						</table>
					</div>
					<audio id="artistPreviewAudio" preload="none" style="width: 100%; margin-top: 14px;"></audio>
				</div>
			</section>
		</main>

		<script>
			const artistsBody = document.getElementById('artistsBody');
			const artistsStatus = document.getElementById('artistsStatus');
			const artistSongsPanel = document.getElementById('artistSongsPanel');
			const artistsTableWrap = document.querySelector('.artists-table-wrap');
			const artistsHead = document.querySelector('.artists-head');
			const songsTitle = document.getElementById('songsTitle');
			const songsStatus = document.getElementById('songsStatus');
			const songsBody = document.getElementById('songsBody');
			const backToArtistsBtn = document.getElementById('backToArtistsBtn');
			let activeArtistName = '';

			function postToParent(type, payload = {}) {
				window.parent.postMessage({ source: 'artistes', type, ...payload }, '*');
			}

			function hideArtists() {
				artistsHead.classList.add('is-hidden');
				artistsTableWrap.classList.add('is-hidden');
			}

			function showArtists() {
				artistsHead.classList.remove('is-hidden');
				artistsTableWrap.classList.remove('is-hidden');
			}

			function escapeHtml(value) {
				return String(value)
					.replace(/&/g, '&amp;')
					.replace(/</g, '&lt;')
					.replace(/>/g, '&gt;')
					.replace(/\"/g, '&quot;');
			}

			function setStatus(message, isError = false) {
				artistsStatus.textContent = message;
				artistsStatus.style.color = isError ? '#fca5a5' : '#7dd3fc';
			}

			function setSongsStatus(message, isError = false) {
				songsStatus.textContent = message;
				songsStatus.style.color = isError ? '#fca5a5' : '#7dd3fc';
			}

			function formatDuration(value) {
				const seconds = Number(value || 0);
				if (!Number.isFinite(seconds) || seconds <= 0) {
					return '-';
				}

				const total = Math.floor(seconds);
				const minutes = Math.floor(total / 60);
				const remaining = total % 60;
				return `${String(minutes).padStart(2, '0')}:${String(remaining).padStart(2, '0')}`;
			}

			async function loadArtistSongs(artistName) {
				const artist = String(artistName || '').trim();
				if (!artist) {
					return;
				}

				activeArtistName = artist;

				hideArtists();
				artistSongsPanel.classList.remove('is-hidden');
				songsTitle.textContent = `Musiques de ${artist}`;
				songsBody.innerHTML = '';
				setSongsStatus('Chargement...');

				try {
					const response = await fetch(`php/interface.php?artistSongs=1&artist=${encodeURIComponent(artist)}`, {
						credentials: 'same-origin',
						cache: 'no-store',
					});

					if (response.status === 401) {
						window.location.replace('login.html');
						return;
					}

					const payload = await response.json();
					if (!response.ok || !payload.success) {
						throw new Error(payload.error || 'Impossible de recuperer les musiques de cet artiste');
					}

					const songs = Array.isArray(payload.songs) ? payload.songs : [];
					songsBody.innerHTML = '';

					if (!songs.length) {
						songsBody.innerHTML = '<tr><td colspan="5">Aucune musique pour cet artiste</td></tr>';
						setSongsStatus('Aucune musique trouvee pour cet artiste.');
						return;
					}

					songs.forEach((song) => {
						const row = document.createElement('tr');
						row.innerHTML = `
							<td>${escapeHtml(song.Titre || '')}</td>
							<td>${escapeHtml(song.Album || '')}</td>
							<td>${formatDuration(song.Duree)}</td>
							<td>${Number(song.NombreVueInterne || 0)}</td>
							<td><button type="button" class="song-play-button">▶</button></td>
						`;

						const playButton = row.querySelector('.song-play-button');
						playButton.addEventListener('click', () => {
							void playArtistSong(song);
						});
						songsBody.appendChild(row);
					});

					setSongsStatus(`${songs.length} musique(s) chargee(s).`);
				} catch (error) {
					console.error(error);
					setSongsStatus(error.message || 'Erreur de chargement.', true);
				}
			}

			async function playArtistSong(song) {
				const id = String((song && song.Id) || '').trim();
				if (!id) {
					setSongsStatus('Impossible de lire cette musique (Id manquant).', true);
					return;
				}

				postToParent('ARTIST_PLAY_SONG', {
					song: {
						...song,
						Artiste: activeArtistName || String(song.Artiste || ''),
					},
				});
				setSongsStatus(`Lecture envoyee au lecteur: ${song.Titre || id}`);
			}

			async function loadArtists() {
				try {
					const response = await fetch('php/interface.php?artists=1', {
						credentials: 'same-origin',
						cache: 'no-store',
					});

					if (response.status === 401) {
						window.location.replace('login.html');
						return;
					}

					const payload = await response.json();
					if (!response.ok || !payload.success) {
						throw new Error(payload.error || 'Impossible de recuperer la liste des artistes');
					}

					const artists = Array.isArray(payload.artists) ? payload.artists : [];

					artistsBody.innerHTML = '';
					if (!artists.length) {
						artistsBody.innerHTML = '<tr><td colspan="3">Aucun artiste en base</td></tr>';
						setStatus('Aucun artiste trouve.');
						return;
					}

					artists.forEach((artist) => {
						const row = document.createElement('tr');
						const artistName = String(artist.Artiste || '').trim();
						row.innerHTML = `
							<td><button type="button" class="artist-name-button">${escapeHtml(artist.Artiste || '')}</button></td>
							<td>${Number(artist.TotalMusiques || 0)}</td>
							<td>${Number(artist.TotalVuesInternes || 0)}</td>
						`;

						const button = row.querySelector('.artist-name-button');
						button.addEventListener('click', () => {
							void loadArtistSongs(artistName);
						});
						artistsBody.appendChild(row);
					});

					setStatus(`${artists.length} artiste(s) charge(s).`);
				} catch (error) {
					console.error(error);
					setStatus(error.message || 'Erreur de chargement.', true);
				}
			}

			void loadArtists();

			backToArtistsBtn.addEventListener('click', () => {
				showArtists();
				artistSongsPanel.classList.add('is-hidden');
				songsBody.innerHTML = '';
				activeArtistName = '';
			});
		</script>
	</body>
</html>
