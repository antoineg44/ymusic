<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Description musique</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
      }

      .description-page {
        padding: 16px;
      }

      .description-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .edit-button {
        border: 0;
        border-radius: 999px;
        padding: 8px 14px;
        cursor: pointer;
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
      }

      .head-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .download-button {
        border: 0;
        border-radius: 999px;
        padding: 8px 14px;
        cursor: pointer;
        background: #22c55e;
        color: #052e16;
        font-weight: 700;
      }

      .youtube-button {
        border: 0;
        border-radius: 999px;
        padding: 8px 14px;
        cursor: pointer;
        background: #ef4444;
        color: #fee2e2;
        font-weight: 700;
      }

      .description-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }

      .description-subtitle {
        margin: 16px 0 8px;
      }

      .playlist-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }

      .playlist-item {
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 10px;
        padding: 10px;
      }

      .playlist-name {
        color: #f8fafc;
        font-weight: 700;
      }

      .playlist-meta {
        color: #cbd5e1;
        font-size: 0.9rem;
        margin-top: 4px;
      }

      .description-item {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 10px;
        align-items: start;
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 10px;
        padding: 10px;
      }

      .description-key {
        color: #cbd5e1;
        font-weight: 700;
      }

      .description-value {
        color: #f8fafc;
        overflow-wrap: anywhere;
      }

      @media (max-width: 700px) {
        .description-item {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="description-page">
      <section class="panel">
        <div class="description-head">
          <h1>Description de la musique</h1>
          <div class="head-actions">
            <button id="youtubeButton" class="youtube-button" type="button">Ouvrir avec YouTube</button>
            <button id="downloadButton" class="download-button" type="button">Télécharger</button>
            <button id="editButton" class="edit-button" type="button">Editer</button>
          </div>
        </div>
        <p id="descriptionStatus" class="status">Chargement...</p>
        <ul id="descriptionList" class="description-list"></ul>
        <h2 class="description-subtitle">Playlists contenant cette musique</h2>
        <ul id="musicPlaylists" class="playlist-list"></ul>
      </section>
    </main>

    <script>
      const descriptionStatus = document.getElementById('descriptionStatus');
      const descriptionList = document.getElementById('descriptionList');
      const musicPlaylists = document.getElementById('musicPlaylists');
      const editButton = document.getElementById('editButton');
      const youtubeButton = document.getElementById('youtubeButton');
      const downloadButton = document.getElementById('downloadButton');
      let currentMusic = null;

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\"/g, '&quot;');
      }

      function setStatus(message, isError = false) {
        descriptionStatus.textContent = message;
        descriptionStatus.style.color = isError ? '#fca5a5' : '#7dd3fc';
      }

      function postToParent(type, payload = {}) {
        window.parent.postMessage({ source: 'description', type, ...payload }, '*');
      }

      function renderMusicDetails(music) {
        const orderedKeys = [
          'Id',
          'Titre',
          'Artiste',
          'Utilisateur',
          'Album',
          'Duree',
          'AnneeParution',
          'Genre',
          'NombreVue',
          'NombreVueInterne',
          'DateAjout',
        ];

        descriptionList.innerHTML = '';

        orderedKeys.forEach((key) => {
          const item = document.createElement('li');
          item.className = 'description-item';

          const rawValue = music[key];
          const value = rawValue === null || rawValue === undefined || String(rawValue).trim() === '' ? '-' : String(rawValue);

          item.innerHTML = `
            <span class="description-key">${escapeHtml(key)}</span>
            <span class="description-value">${escapeHtml(value)}</span>
          `;

          descriptionList.appendChild(item);
        });
      }

      function renderMusicPlaylists(playlists) {
        musicPlaylists.innerHTML = '';

        if (!Array.isArray(playlists) || playlists.length === 0) {
          const item = document.createElement('li');
          item.className = 'playlist-item';
          item.innerHTML = `
            <div class="playlist-name">Aucune playlist</div>
            <div class="playlist-meta">Cette musique n'est dans aucune playlist pour le moment.</div>
          `;
          musicPlaylists.appendChild(item);
          return;
        }

        playlists.forEach((playlist) => {
          const playlistName = String(playlist && playlist.NomPlaylist ? playlist.NomPlaylist : 'Playlist sans nom');
          const owner = String(playlist && playlist.UtilisateurNom ? playlist.UtilisateurNom : '').trim();
          const position = Number(playlist && playlist.PositionLecture ? playlist.PositionLecture : 0);

          const metaParts = [];
          if (owner) {
            metaParts.push(`Par ${owner}`);
          }
          if (position > 0) {
            metaParts.push(`Position ${position}`);
          }

          const item = document.createElement('li');
          item.className = 'playlist-item';
          item.innerHTML = `
            <div class="playlist-name">${escapeHtml(playlistName)}</div>
            <div class="playlist-meta">${escapeHtml(metaParts.join(' • ') || 'Playlist personnelle')}</div>
          `;

          musicPlaylists.appendChild(item);
        });
      }

      function sanitizeFileName(value) {
        return String(value || '')
          .trim()
          .replace(/[\\/:*?"<>|]+/g, '-')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function getDownloadExtension(downloadPayload) {
        const payloadPath = String((downloadPayload && downloadPayload.path) || '').trim();
        const payloadFile = String((downloadPayload && downloadPayload.file) || '').trim();
        const source = payloadPath || payloadFile;
        const match = source.match(/\.([a-zA-Z0-9]+)$/);
        return match ? `.${match[1]}` : '.mp3';
      }

      function resolveDownloadPath(downloadPayload) {
        const payloadPath = String((downloadPayload && downloadPayload.path) || '').trim();
        if (payloadPath) {
          return payloadPath;
        }

        const payloadFile = String((downloadPayload && downloadPayload.file) || '').trim();
        if (payloadFile) {
          return `data/temp/${payloadFile}`;
        }

        return '';
      }

      async function loadDescription() {
        const params = new URLSearchParams(window.location.search);
        const id = String(params.get('id') || '').trim();
        const title = String(params.get('title') || '').trim();
        const artist = String(params.get('artist') || '').trim();

        if (!id) {
          setStatus('Aucune musique selectionnee.', true);
          return;
        }

        setStatus(`Chargement des details pour ${id}...`);

        try {
          const requestParams = new URLSearchParams({
            musicDetails: '1',
            id,
          });
          if (title) {
            requestParams.set('title', title);
          }
          if (artist) {
            requestParams.set('artist', artist);
          }

          const response = await fetch(`php/interface.php?${requestParams.toString()}`, {
            credentials: 'same-origin',
            cache: 'no-store',
          });

          if (response.status === 401) {
            window.location.replace('login.html');
            return;
          }

          const payload = await response.json();
          if (!response.ok || !payload.success || !payload.music) {
            throw new Error(payload.error || 'Impossible de recuperer la description de la musique');
          }

          currentMusic = payload.music;

          renderMusicDetails(payload.music);
          renderMusicPlaylists(payload.playlists);

          if (payload.found === false) {
            setStatus('Musique non trouvee en base pour le moment. Les informations affichees sont partielles.', true);
            return;
          }

          setStatus('Details charges.');
        } catch (error) {
          console.error(error);
          setStatus(error.message || 'Erreur de chargement.', true);
        }
      }

      editButton.addEventListener('click', () => {
        const params = new URLSearchParams(window.location.search);
        const id = String(params.get('id') || '').trim();
        if (!id) {
          setStatus('Impossible d\'ouvrir l\'edition (Id manquant).', true);
          return;
        }

        postToParent('OPEN_EDITIONS', { id });
      });

      downloadButton.addEventListener('click', async () => {
        const params = new URLSearchParams(window.location.search);
        const id = String(params.get('id') || '').trim();

        if (!id) {
          setStatus('Impossible de telecharger (Id manquant).', true);
          return;
        }

        try {
          setStatus('Preparation du telechargement...');

          const response = await fetch(`php/interface.php?musicId=${encodeURIComponent(id)}`, {
            credentials: 'same-origin',
            cache: 'no-store',
          });

          if (response.status === 401) {
            window.location.replace('login.html');
            return;
          }

          const payload = await response.json();
          if (!response.ok || !payload.success || !payload.download) {
            throw new Error(payload.error || 'Impossible de preparer le telechargement');
          }

          const sourcePath = resolveDownloadPath(payload.download);
          if (!sourcePath) {
            throw new Error('Le serveur n\'a retourne aucun fichier telechargeable.');
          }

          const musicTitle = sanitizeFileName((currentMusic && currentMusic.Titre) || id) || id;
          const extension = getDownloadExtension(payload.download);
          const downloadName = `${musicTitle}${extension}`;

          const link = document.createElement('a');
          link.href = sourcePath;
          link.download = downloadName;
          link.rel = 'noopener';
          document.body.appendChild(link);
          link.click();
          link.remove();

          setStatus(`Telechargement lance: ${downloadName}`);
        } catch (error) {
          console.error(error);
          setStatus(error.message || 'Erreur de telechargement.', true);
        }
      });

      youtubeButton.addEventListener('click', () => {
        const params = new URLSearchParams(window.location.search);
        const idFromParams = String(params.get('id') || '').trim();
        const id = String((currentMusic && currentMusic.Id) || idFromParams).trim();

        if (!id) {
          setStatus('Impossible d\'ouvrir YouTube (Id manquant).', true);
          return;
        }

        const youtubeUrl = `https://www.youtube.com/watch?v=${encodeURIComponent(id)}`;
        const openedWindow = window.open(youtubeUrl, '_blank', 'noopener,noreferrer');
        if (!openedWindow) {
          setStatus('Le navigateur a bloque l\'ouverture du nouvel onglet.', true);
          return;
        }

        setStatus('Ouverture de YouTube dans un nouvel onglet.');
      });

      void loadDescription();
    </script>
  </body>
</html>
