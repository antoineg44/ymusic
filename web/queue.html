<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Queue - YMusic</title>
    <link rel="stylesheet" href="css/colors.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--background);
        position: static;
        top: auto;
        color-scheme: dark;
        font-family: Inter, Arial, sans-serif;
        color: #e2e8f0;
      }

      .queue-page {
        max-width: 1300px;
        margin: 0 auto;
        padding: 18px;
      }

      .queue-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .queue-title {
        font-size: 1.3rem;
        font-weight: bold;
        color: #dbeafe;
        margin: 0;
      }

      .panel {
        width: 100%;
      }

      .panel.is-hidden {
        display: none;
      }

      .panel ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .panel li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 12px;
        padding: 10px 12px;
      }

      .panel li.queue-item-present {
        background: rgba(56, 189, 248, 0.28);
        border-color: rgba(14, 165, 233, 0.8);
      }

      .panel li.queue-item-missing {
        background: #ffffff;
        border-color: rgba(148, 163, 184, 0.6);
      }

      .panel li.queue-item-missing .track-info strong,
      .panel li.queue-item-missing .track-info small {
        color: #0f172a;
      }

      .panel li.queue-item-missing .queue-item-index {
        background: rgba(255, 255, 255, 0.3);
        color: #0f172a;
      }

      .queue-item-index {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        background: rgba(56, 189, 248, 0.2);
        border-radius: 50%;
        color: #38bdf8;
        font-weight: bold;
        font-size: 0.9rem;
        flex-shrink: 0;
      }

      .queue-item-index.playing {
        background: rgba(34, 197, 94, 0.2);
        color: #22c55e;
      }

      @keyframes bar-pulse {
        0%, 100% { height: 4px; opacity: 0.6; }
        50% { height: 12px; opacity: 1; }
      }

      .playing-icon {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 3px;
        width: 100%;
        height: 100%;
      }

      .playing-icon span {
        width: 3px;
        background: #22c55e;
        border-radius: 2px;
        animation: bar-pulse 0.8s ease-in-out infinite;
      }

      .playing-icon span:nth-child(1) {
        animation-delay: -0.4s;
      }

      .playing-icon span:nth-child(2) {
        animation-delay: -0.2s;
      }

      .playing-icon span:nth-child(3) {
        animation-delay: 0s;
      }

      .track-info {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex: 1;
      }

      .track-info strong {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .track-info small {
        color: #94a3b8;
      }

      .play-btn {
        border: 0;
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
      }

      .delete-btn {
        border: 0;
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        background: #ef4444;
        color: #fee2e2;
        font-weight: 700;
      }

      .delete-btn:hover {
        background: #dc2626;
      }

      .status {
        margin-top: 10px;
        color: #7dd3fc;
        min-height: 1.3em;
      }

      .queue-empty {
        text-align: center;
        color: #94a3b8;
        padding: 40px 20px;
      }
    </style>
  </head>
  <body>
    <main class="queue-page">
      <section class="panel">
        <div class="queue-header">
          <h1 class="queue-title">Musiques en attente</h1>
        </div>
        <div id="queueStatus" class="status"></div>
        <ul id="queueList"></ul>
        <div id="queueEmpty" class="queue-empty" style="display: none;">
          Aucune musique en attente
        </div>
      </section>
    </main>

    <script src="js/display.js"></script>
    <script>
      const queueList = document.getElementById('queueList');
      const queueStatus = document.getElementById('queueStatus');
      const queueEmpty = document.getElementById('queueEmpty');
      let queueRenderToken = 0;
      let queueRenderAbortController = null;

      function beginQueueRender() {
        queueRenderToken += 1;

        if (queueRenderAbortController) {
          queueRenderAbortController.abort();
        }

        queueRenderAbortController = new AbortController();
        return {
          token: queueRenderToken,
          signal: queueRenderAbortController.signal,
        };
      }

      function isQueueRenderActive(token) {
        return token === queueRenderToken;
      }

      async function checkMusicInDatabase(track, signal) {
        const id = String((track && track.videoId) || '').trim();
        if (!id) {
          return { found: false, duration: 0, views: 0 };
        }

        const title = String((track && track.title) || '').trim();
        const artist = Array.isArray(track && track.artists)
          ? String(track.artists[0] || '').trim()
          : '';

        const requestParams = new URLSearchParams({
          musicDetails: '1',
          id,
        });

        if (title) {
          requestParams.set('title', title);
        }

        if (artist) {
          requestParams.set('artist', artist);
        }

        try {
          const response = await fetch(`php/interface.php?${requestParams.toString()}`, {
            credentials: 'same-origin',
            cache: 'no-store',
            signal,
          });

          if (response.status === 401) {
            window.location.replace('login.html');
            return { found: false, duration: 0, views: 0 };
          }

          const payload = await response.json();
          const found = Boolean(response.ok && payload.success && payload.found === true);
          const music = payload.music || {};
          
          return {
            found,
            duration: Number(music.Duree || 0),
            views: Number(music.NombreVue || 0),
          };
        } catch (error) {
          if (error && error.name === 'AbortError') {
            return null;
          }

          console.debug('Presence check failed for queue track:', error);
          return { found: false, duration: 0, views: 0 };
        }
      }

      async function renderQueue(queue, currentIndex) {
        const renderRun = beginQueueRender();

        if (!queueList || !queueEmpty || !queueStatus) {
          return;
        }

        if (!queue || !Array.isArray(queue) || queue.length === 0) {
          if (!isQueueRenderActive(renderRun.token)) {
            return;
          }

          queueList.innerHTML = '';
          queueEmpty.style.display = 'block';
          return;
        }

        if (!isQueueRenderActive(renderRun.token)) {
          return;
        }

        queueEmpty.style.display = 'none';
        queueList.innerHTML = '';

        // Afficher seulement à partir de la musique actuelle
        const startIndex = Math.max(0, currentIndex >= 0 ? currentIndex : 0);

        for (let index = startIndex; index < queue.length; index += 1) {
          const track = queue[index];
          if (!track) {
            continue;
          }

          if (!isQueueRenderActive(renderRun.token)) {
            return;
          }

          const displayTrack = {
            ...track,
            isPlaying: (index === currentIndex),
            displayIndex: (index - startIndex) + 1,
          };

          // Vérifier si la musique existe en base et récupérer les détails
          const musicInfo = await checkMusicInDatabase(displayTrack, renderRun.signal);
          if (!isQueueRenderActive(renderRun.token)) {
            return;
          }

          if (musicInfo === null) {
            return;
          }

          displayTrack.isInDatabase = musicInfo.found;
          
          // Utiliser les durée et vues de la base si disponibles
          if (!displayTrack.duration) {
            displayTrack.duration = musicInfo.duration;
          }
          if (!displayTrack.views) {
            displayTrack.views = musicInfo.views;
          }

          // buttons configurations
          displayTrack.buttons = { buttons: { play: {type: 'QUEUE_PLAY_TRACK'}, delete: {type: 'QUEUE_REMOVE_TRACK'} }, source: 'queue' };

          const item = renderElement(displayTrack, index);
          if (!isQueueRenderActive(renderRun.token)) {
            return;
          }

          queueList.appendChild(item);
        }

        if (isQueueRenderActive(renderRun.token)) {
          queueRenderAbortController = null;
        }
      }

      // Écouter les messages du parent
      window.addEventListener('message', (event) => {
        const message = event.data;
        if (!message || message.target !== 'queue') {
          return;
        }

        if (message.type === 'UPDATE_QUEUE') {
          void renderQueue(message.queue, message.currentIndex);
          const count = message.queue ? message.queue.length : 0;
          queueStatus.textContent = count > 0
            ? `${count} musique${count > 1 ? 's' : ''} en attente`
            : '';
        }
      });
    </script>
  </body>
</html>
