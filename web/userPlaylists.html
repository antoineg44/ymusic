<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Mes Playlists - YMusic</title>
		<link rel="stylesheet" href="css/colors.css" />
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				background: var(--background);
				color-scheme: dark;
				font-family: Inter, Arial, sans-serif;
				color: #e2e8f0;
			}

			.playlists-page {
				max-width: 1300px;
				margin: 0 auto;
			}

			.playlists-head {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 12px;
				margin-bottom: 16px;
			}

			.playlists-actions {
				display: flex;
				align-items: center;
				gap: 10px;
			}

			.playlists-create-btn {
				border: 0;
				border-radius: 999px;
				padding: 10px 16px;
				cursor: pointer;
				background: #38bdf8;
				color: #082f49;
				font-weight: 700;
			}

			.content-grid {
				display: grid;
				grid-template-columns: 360px 1fr;
				gap: 16px;
			}

			.card {
				background: rgba(30, 41, 59, 0.7);
				border: 1px solid rgba(148, 163, 184, 0.15);
				border-radius: 12px;
				padding: 12px;
			}


			.playlists-table {
				width: 100%;
				border-collapse: collapse;
			}

			.playlists-table th,
			.playlists-table td {
				text-align: left;
				border-bottom: 1px solid rgba(148, 163, 184, 0.2);
				padding: 10px;
				vertical-align: top;
			}

			.playlists-table th {
				color: #94a3b8;
				font-weight: 600;
			}

			.playlist-row.is-active {
				background: rgba(56, 189, 248, 0.1);
			}

			.playlist-user-link {
				color: #7dd3fc;
				text-decoration: none;
			}

			.playlist-user-link:hover {
				text-decoration: underline;
			}

			.playlist-open-btn {
				border: 0;
				border-radius: 999px;
				padding: 6px 10px;
				cursor: pointer;
				background: #38bdf8;
				color: #082f49;
				font-weight: 700;
			}

			.musiques-table {
				width: 100%;
				border-collapse: collapse;
			}

			.musiques-table th,
			.musiques-table td {
				text-align: left;
				border-bottom: 1px solid rgba(148, 163, 184, 0.2);
				padding: 10px;
				white-space: nowrap;
			}

			.play-btn {
				border: 0;
				border-radius: 999px;
				padding: 6px 10px;
				cursor: pointer;
				background: #38bdf8;
				color: #082f49;
				font-weight: 700;
			}

			.status {
				margin: 0;
				color: #7dd3fc;
			}

			@media (max-width: 980px) {
				.content-grid {
					grid-template-columns: 1fr;
				}
			}
		</style>
	</head>
	<body>
		<main class="playlists-page">
			<section class="playlists-head">
				<div>
					<p id="playlistsStatus" class="status">Chargement des playlists...</p>
				</div>
				<div class="playlists-actions">
					<button id="createPlaylistButton" class="playlists-create-btn" type="button">Nouvelle playlist</button>
				</div>
			</section>

			<section class="content-grid">
				<article class="card" aria-label="Liste des playlists">
					<h2>Mes Playlists</h2>
					<div class="musiques-table-wrap">
						<table class="playlists-table" aria-label="Mes playlists">
							<thead>
								<tr>
									<th>ID</th>
									<th>Nom</th>
									<th>Description</th>
									<th>Date derniere modification</th>
									<th>Vues</th>
									<th>Utilisateur</th>
									<th>Action</th>
								</tr>
							</thead>
							<tbody id="playlistsBody"></tbody>
						</table>
					</div>
				</article>

				<article class="card" aria-label="Musiques de la playlist">
					<h2 id="songsTitle">Musiques</h2>
					<div class="musiques-table-wrap">
						<table class="musiques-table" aria-label="Musiques de playlist">
							<thead>
								<tr>
									<th>Titre</th>
									<th>Artiste</th>
									<th>Album</th>
									<th>Vues</th>
									<th>Vues internes</th>
									<th>Action</th>
								</tr>
							</thead>
							<tbody id="songsBody"></tbody>
						</table>
					</div>
				</article>
			</section>
		</main>

		<script>
			const playlistsStatus = document.getElementById('playlistsStatus');
			const playlistsBody = document.getElementById('playlistsBody');
			const songsBody = document.getElementById('songsBody');
			const songsTitle = document.getElementById('songsTitle');
			const createPlaylistButton = document.getElementById('createPlaylistButton');

			let activePlaylistId = '';
			let currentUserId = 0;

			function postToParent(type, payload = {}) {
				window.parent.postMessage({ source: 'liste', type, ...payload }, '*');
			}

			function escapeHtml(value) {
				return String(value ?? '')
					.replace(/&/g, '&amp;')
					.replace(/</g, '&lt;')
					.replace(/>/g, '&gt;')
					.replace(/\"/g, '&quot;');
			}

			function setStatus(message, isError = false) {
				playlistsStatus.textContent = message;
				playlistsStatus.style.color = isError ? '#fca5a5' : '#7dd3fc';
			}

			function formatMeta(playlist) {
				const total = Number(playlist.TotalMusiques || 0);
				return `${total} musique(s)`;
			}

			function formatDate(value) {
				if (!value) {
					return '-';
				}

				return String(value).replace('T', ' ');
			}

			function renderUserLink(playlist) {
				const userId = Number(playlist.Utilisateur || 0);
				const userName = String(playlist.UtilisateurNom || '').trim();

				if (!userId) {
					return escapeHtml(userName || '-');
				}

				const label = userName ? `${escapeHtml(userName)} (${userId})` : String(userId);
				return `<a class="playlist-user-link" href="users.html#user-${userId}">${label}</a>`;
			}

			function renderPlaylists(playlists) {
				playlistsBody.innerHTML = '';

				if (!playlists.length) {
					playlistsBody.innerHTML = '<tr><td colspan="7">Aucune playlist personnelle creee.</td></tr>';
					return;
				}

				playlists.forEach((playlist) => {
					const id = Number(playlist.PlaylistId || 0);
					const tr = document.createElement('tr');
					tr.className = `playlist-row ${activePlaylistId === id ? 'is-active' : ''}`;
					tr.dataset.id = String(id);
					tr.innerHTML = `
						<td>${id || '-'}</td>
						<td>${escapeHtml(playlist.NomPlaylist || 'Playlist')}</td>
						<td>${escapeHtml(playlist.Description || '')}</td>
						<td>${escapeHtml(formatDate(playlist.DateDerniereModification))}</td>
						<td>${Number(playlist.NombreVue || 0)}</td>
						<td>${renderUserLink(playlist)}</td>
						<td><button type="button" class="playlist-open-btn">Ouvrir</button></td>
					`;

					tr.querySelector('.playlist-open-btn').addEventListener('click', () => {
						activePlaylistId = id;
						void loadPlaylistSongs(String(id), playlist.NomPlaylist || String(id));
						const allRows = playlistsBody.querySelectorAll('.playlist-row');
						allRows.forEach((el) => el.classList.remove('is-active'));
						tr.classList.add('is-active');
					});

					playlistsBody.appendChild(tr);
				});
			}

			function renderSongs(rows) {
				songsBody.innerHTML = '';

				if (!rows.length) {
					songsBody.innerHTML = '<tr><td colspan="6">Aucune musique liée à cette playlist.</td></tr>';
					return;
				}

				rows.forEach((row) => {
					const tr = document.createElement('tr');
					tr.innerHTML = `
						<td>${escapeHtml(row.Titre)}</td>
						<td>${escapeHtml(row.Artiste)}</td>
						<td>${escapeHtml(row.Album)}</td>
						<td>${Number(row.NombreVue || 0)}</td>
						<td>${Number(row.NombreVueInterne || 0)}</td>
						<td><button type="button" class="play-btn">▶</button></td>
					`;

					tr.querySelector('.play-btn').addEventListener('click', () => {
						postToParent('LIST_PLAY_SONG', { song: row });
						setStatus(`Lecture envoyée au lecteur: ${row.Titre || row.Id}`);
					});

					songsBody.appendChild(tr);
				});
			}

			async function loadPlaylistSongs(playlistId, playlistName) {
				try {
					songsTitle.textContent = `Musiques - ${playlistName}`;
					const response = await fetch(`php/interface.php?playlistSongs=1&id=${encodeURIComponent(playlistId)}`, {
						credentials: 'same-origin',
						cache: 'no-store',
					});

					if (response.status === 401) {
						window.location.replace('login.html');
						return;
					}

					const payload = await response.json();
					if (!response.ok || !payload.success) {
						throw new Error(payload.error || 'Impossible de récupérer les musiques de la playlist.');
					}

					const rows = Array.isArray(payload.songs) ? payload.songs : [];
					renderSongs(rows);
					setStatus(`Playlist "${playlistName}" chargée (${rows.length} musique(s)).`);
				} catch (error) {
					console.error(error);
					setStatus(error.message || 'Erreur de chargement des musiques.', true);
				}
			}

			async function getCurrentUsername() {
				try {
					const response = await fetch('php/interface.php?currentUser=1', {
						credentials: 'same-origin',
						cache: 'no-store',
					});

					if (response.status === 401) {
						window.location.replace('login.html');
						return null;
					}

					const payload = await response.json();
					if (payload.success && payload.username) {
						return String(payload.username);
					}
					return null;
				} catch (error) {
					console.error(error);
					return null;
				}
			}

			async function loadPlaylists() {
				try {
					const currentUser = await getCurrentUser();
					if (!currentUser) {
						setStatus('Impossible de récupérer votre utilisateur courant.', true);
						return;
					}

					currentUserId = Number(currentUser.id || 0);

					const response = await fetch('php/interface.php?dbPlaylists=1', {
						credentials: 'same-origin',
						cache: 'no-store',
					});

					if (response.status === 401) {
						window.location.replace('login.html');
						return;
					}

					const payload = await response.json();
					if (!response.ok || !payload.success) {
						throw new Error(payload.error || 'Impossible de récupérer la liste des playlists.');
					}

					const allPlaylists = Array.isArray(payload.playlists) ? payload.playlists : [];
					const userPlaylists = allPlaylists.filter((p) => {
						return Number(p.Utilisateur || 0) === currentUserId;
					});

					renderPlaylists(userPlaylists);
					setStatus(`${userPlaylists.length} playlist(s) personnelle(s) chargée(s).`);

					if (userPlaylists.length > 0) {
						const first = userPlaylists[0];
						activePlaylistId = Number(first.PlaylistId || 0);
						if (activePlaylistId) {
							void loadPlaylistSongs(String(activePlaylistId), first.NomPlaylist || String(activePlaylistId));
						}
					}
				} catch (error) {
					console.error(error);
					setStatus(error.message || 'Erreur de chargement.', true);
				}
			}

			async function getCurrentUser() {
				try {
					const response = await fetch('php/interface.php?currentUser=1', {
						credentials: 'same-origin',
						cache: 'no-store',
					});

					if (response.status === 401) {
						window.location.replace('login.html');
						return null;
					}

					const payload = await response.json();
					if (payload.success && payload.id) {
						return { id: Number(payload.id), username: String(payload.username || '') };
					}
					return null;
				} catch (error) {
					console.error(error);
					return null;
				}
			}

			async function createPlaylist() {
				const name = String(window.prompt('Nom de la playlist:') || '').trim();
				if (!name) {
					return;
				}

				const description = String(window.prompt('Description de la playlist:') || '').trim();

				try {
					const body = new URLSearchParams({
						createPlaylist: '1',
						NomPlaylist: name,
						Description: description,
					});

					const response = await fetch('php/interface.php', {
						method: 'POST',
						credentials: 'same-origin',
						cache: 'no-store',
						body,
					});

					if (response.status === 401) {
						window.location.replace('login.html');
						return;
					}

					const payload = await response.json();
					if (!response.ok || !payload.success) {
						throw new Error(payload.error || 'Impossible de creer la playlist.');
					}

					setStatus('Playlist creee.');
					await loadPlaylists();
					const createdId = Number(payload.playlist && payload.playlist.PlaylistId ? payload.playlist.PlaylistId : 0);
					if (createdId) {
						activePlaylistId = createdId;
						void loadPlaylistSongs(String(createdId), name);
					}
				} catch (error) {
					console.error(error);
					setStatus(error.message || 'Impossible de créer la playlist.', true);
				}
			}

			function initEvent() {
				window.addEventListener('message', (event) => {
					const message = event.data;
					if (!message || message.target !== 'userPlaylists') {
						return;
					}

					if (message.type === 'REFRESH_USER_PLAYLISTS') {
						void loadPlaylists();
					}
				});
			}

			function init() {
				createPlaylistButton.addEventListener('click', () => {
					void createPlaylist();
				});
				void loadPlaylists();
				initEvent();
			}

			init();
		</script>
	</body>
</html>
