<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Liste des musiques - YMusic</title>
		<link rel="stylesheet" href="css/colors.css" />
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				background: var(--background);
				position: static;
				top: auto;
				color-scheme: dark;
				font-family: Inter, Arial, sans-serif;
				color: #e2e8f0;
			}

			.musiques-page {
				max-width: 1300px;
				margin: 0 auto;
			}

			.musiques-head {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 12px;
				margin-bottom: 16px;
			}

			.musiques-back {
				color: #bae6fd;
			}

			.musiques-table {
				width: 100%;
				border-collapse: collapse;
			}

			.musiques-table th,
			.musiques-table td {
				text-align: left;
				border-bottom: 1px solid var(--background);
				padding: 10px;
				white-space: nowrap;
			}

			.musiques-table th.sortable {
				cursor: pointer;
				user-select: none;
			}

			.musiques-table th.sortable.is-active {
				color: #7dd3fc;
			}

			.play-btn {
				border: 0;
				border-radius: 999px;
				padding: 6px 10px;
				cursor: pointer;
				background: #38bdf8;
				color: #082f49;
				font-weight: 700;
			}

			.pagination {
				display: flex;
				justify-content: flex-end;
				align-items: center;
				gap: 10px;
				margin-top: 12px;
			}

			.pagination button {
				border: 1px solid rgba(148, 163, 184, 0.25);
				background: rgba(15, 23, 42, 0.7);
				color: #e2e8f0;
				padding: 6px 10px;
				border-radius: 8px;
				cursor: pointer;
			}

			.pagination button:disabled {
				opacity: 0.45;
				cursor: not-allowed;
			}

			.panel {
				width: 100%;
				grid-column: 1 / -1;
			}

			.panel.is-hidden {
				display: none;
			}

			.panel h2 {
				margin-top: 0;
				font-size: 1.1rem;
			}

			.panel ul {
				list-style: none;
				margin: 0;
				padding: 0;
				display: flex;
				flex-direction: column;
				gap: 10px;
			}

			.panel li {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 10px;
				background: rgba(30, 41, 59, 0.7);
				border: 1px solid rgba(148, 163, 184, 0.15);
				border-radius: 12px;
				padding: 10px 12px;
			}
		</style>
	</head>
	<body>
		<main class="musiques-page">
			<section class="panel">
				<div class="musiques-head">
					<div>
						<p id="musiquesStatus" class="status">Chargement...</p>
					</div>
				</div>

				<div class="musiques-table-wrap">
					<table class="musiques-table" aria-label="Liste complete des musiques">
						<thead>
							<tr>
								<th class="sortable" data-sort="Id">Id</th>
								<th class="sortable" data-sort="Titre">Titre</th>
								<th class="sortable" data-sort="Artiste">Artiste</th>
								<th class="sortable" data-sort="Utilisateur">Utilisateur</th>
								<th class="sortable" data-sort="Album">Album</th>
								<th class="sortable" data-sort="Duree">Duree</th>
								<th class="sortable" data-sort="AnneeParution">Annee</th>
								<th class="sortable" data-sort="Genre">Genre</th>
								<th class="sortable" data-sort="NombreVue">NombreVue</th>
								<th class="sortable" data-sort="NombreVueInterne">NombreVueInterne</th>
								<th class="sortable" data-sort="DateAjout">DateAjout</th>
								<th>Action</th>
							</tr>
						</thead>
						<tbody id="musiquesBody"></tbody>
					</table>
				</div>

				<div class="pagination" aria-label="Pagination des musiques">
					<button type="button" id="pagePrev" title="Afficher les 50 resultats precedents">50 precedents</button>
					<span id="pageInfo">Resultats 0 - 0 / 0</span>
					<button type="button" id="pageNext" title="Afficher les 50 resultats suivants">50 suivants</button>
				</div>

				<audio id="previewAudio" preload="none" style="width: 100%; margin-top: 14px;"></audio>
			</section>
		</main>

		<script>
			const musiquesBody = document.getElementById('musiquesBody');
			const musiquesStatus = document.getElementById('musiquesStatus');
			const pagePrev = document.getElementById('pagePrev');
			const pageNext = document.getElementById('pageNext');
			const pageInfo = document.getElementById('pageInfo');
			const sortableHeaders = Array.from(document.querySelectorAll('.musiques-table th.sortable'));

			let currentSortBy = 'DateAjout';
			let currentSortDir = 'desc';
			let currentPage = 1;
			let totalPages = 1;
			let totalRows = 0;
			const pageSize = 50;
			const SINGLE_CLICK_DELAY_MS = 220;
			let pendingPlayClickTimer = null;

			function postToParent(type, payload = {}) {
				window.parent.postMessage({ source: 'liste', type, ...payload }, '*');
			}

			function escapeHtml(value) {
				return String(value ?? '')
					.replace(/&/g, '&amp;')
					.replace(/</g, '&lt;')
					.replace(/>/g, '&gt;')
					.replace(/\"/g, '&quot;');
			}

			function renderUtilisateurCell(row) {
				const userId = String(row.UtilisateurId ?? '').trim();
				const userName = String(row.Utilisateur ?? '').trim();

				if (!userId) {
					return escapeHtml(userName);
				}

				const href = `users.html#user-${encodeURIComponent(userId)}`;
				const label = escapeHtml(userId);
				const title = userName ? ` title="${escapeHtml(userName)}"` : '';
				return `<a href="${href}"${title}>${label}</a>`;
			}

			function setStatus(message, isError = false) {
				musiquesStatus.textContent = message;
				musiquesStatus.style.color = isError ? '#fca5a5' : '#7dd3fc';
			}

			function updatePaginationControls() {
				const startIndex = totalRows > 0 ? (currentPage - 1) * pageSize + 1 : 0;
				const endIndex = totalRows > 0 ? Math.min(currentPage * pageSize, totalRows) : 0;
				pageInfo.textContent = `Resultats ${startIndex} - ${endIndex} / ${totalRows}`;
				pagePrev.disabled = currentPage <= 1;
				pageNext.disabled = currentPage >= totalPages;
			}

			function updateSortIndicators() {
				sortableHeaders.forEach((header) => {
					const isActive = header.dataset.sort === currentSortBy;
					header.classList.toggle('is-active', isActive);
					if (isActive) {
						header.textContent = `${header.dataset.label || header.textContent.replace(/\s+[▲▼]$/, '')} ${currentSortDir === 'asc' ? '▲' : '▼'}`;
					} else {
						header.textContent = header.dataset.label || header.textContent.replace(/\s+[▲▼]$/, '');
					}
				});
			}

			function renderMusiques(rows) {
				musiquesBody.innerHTML = '';

				if (!rows.length) {
					musiquesBody.innerHTML = '<tr><td colspan="12">Aucune musique en base</td></tr>';
					return;
				}

				rows.forEach((row) => {
					const tr = document.createElement('tr');
					tr.innerHTML = `
						<td>${escapeHtml(row.Id)}</td>
						<td>${escapeHtml(row.Titre)}</td>
						<td>${escapeHtml(row.Artiste)}</td>
						<td>${renderUtilisateurCell(row)}</td>
						<td>${escapeHtml(row.Album)}</td>
						<td>${escapeHtml(row.Duree)}</td>
						<td>${escapeHtml(row.AnneeParution)}</td>
						<td>${escapeHtml(row.Genre)}</td>
						<td>${Number(row.NombreVue || 0)}</td>
						<td>${Number(row.NombreVueInterne || 0)}</td>
						<td>${escapeHtml(row.DateAjout)}</td>
						<td><button type="button" class="play-btn">▶</button></td>
					`;

					tr.addEventListener('click', (event) => {
						const target = event.target;
						if (target instanceof HTMLElement && target.closest('button')) {
							return;
						}

						if (pendingPlayClickTimer !== null) {
							clearTimeout(pendingPlayClickTimer);
						}

						pendingPlayClickTimer = window.setTimeout(() => {
							pendingPlayClickTimer = null;
							void playMusic(row);
						}, SINGLE_CLICK_DELAY_MS);
					});

					tr.addEventListener('dblclick', (event) => {
						const target = event.target;
						if (target instanceof HTMLElement && target.closest('button')) {
							return;
						}

						if (pendingPlayClickTimer !== null) {
							clearTimeout(pendingPlayClickTimer);
							pendingPlayClickTimer = null;
						}

						postToParent('LIST_OPEN_DESCRIPTION', {
							song: row,
						});
						setStatus(`Description demandee: ${row.Titre || row.Id}`);
					});

					const playButton = tr.querySelector('.play-btn');
					playButton.addEventListener('click', () => {
						void playMusic(row);
					});
					musiquesBody.appendChild(tr);
				});
			}

			async function playMusic(row) {
				const id = String((row && row.Id) || '').trim();
				if (!id) {
					setStatus('Impossible de lire cette musique (Id manquant).', true);
					return;
				}

				postToParent('LIST_PLAY_SONG', {
					song: row,
				});
				setStatus(`Lecture envoyee au lecteur: ${row.Titre || id}`);
			}

			async function loadMusiques() {
				try {
					console.log("Liste.html : loadMusiques");
					const params = new URLSearchParams({
						musiques: '1',
						sortBy: currentSortBy,
						sortDir: currentSortDir,
						page: String(currentPage),
						perPage: String(pageSize),
					});

					const response = await fetch(`php/interface.php?${params.toString()}`, {
						credentials: 'same-origin',
						cache: 'no-store',
					});

					if (response.status === 401) {
						window.location.replace('login.html');
						return;
					}

					const payload = await response.json();

					if (!response.ok || !payload.success) {
						throw new Error(payload.error || 'Impossible de recuperer la liste des musiques');
					}

					currentSortBy = String(payload.sortBy || currentSortBy);
					currentSortDir = String(payload.sortDir || currentSortDir).toLowerCase() === 'asc' ? 'asc' : 'desc';
					currentPage = Math.max(1, Number(payload.page || currentPage));
					totalPages = Math.max(1, Number(payload.totalPages || 1));
					totalRows = Math.max(0, Number(payload.totalRows || 0));

					const musiques = Array.isArray(payload.musiques) ? payload.musiques : [];
					renderMusiques(musiques);
					updateSortIndicators();
					updatePaginationControls();
					setStatus(`${musiques.length} musique(s) chargee(s) sur ${totalRows} - page ${currentPage}/${totalPages} - tri ${currentSortBy} ${currentSortDir.toUpperCase()}.`);
				} catch (error) {
					console.error(error);
					setStatus(error.message || 'Erreur de chargement.', true);
				}
			}

			sortableHeaders.forEach((header) => {
				header.dataset.label = header.textContent;
				header.addEventListener('click', () => {
					const sortBy = String(header.dataset.sort || '').trim();
					if (!sortBy) {
						return;
					}

					if (sortBy === currentSortBy) {
						currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
					} else {
						currentSortBy = sortBy;
						currentSortDir = 'asc';
					}
					currentPage = 1;

					void loadMusiques();
				});
			});

			pagePrev.addEventListener('click', () => {
				if (currentPage <= 1) {
					return;
				}

				currentPage -= 1;
				void loadMusiques();
			});

			pageNext.addEventListener('click', () => {
				if (currentPage >= totalPages) {
					return;
				}

				currentPage += 1;
				void loadMusiques();
			});

			function initEvent() {
				window.addEventListener('message', (event) => {
					const message = event.data;
					if (!message || message.target !== 'liste') {
					return;
					}

					if (message.type === 'REFRESH_LIST') {
						void loadMusiques();
					}
				});
			}

			function init() {
				void loadMusiques();
				initEvent();
			}

			init();
		</script>
	</body>
</html>
