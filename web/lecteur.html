<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Lecteur</title>
		<!--<link rel="stylesheet" href="styles.css" />-->
		<link rel="stylesheet" href="css/colors.css" />
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
        		background:#1e293b;
				overflow: hidden;
				font-family: Inter, Arial, sans-serif;
				color: #e2e8f0;
				color-scheme: dark;
			}

			.player-card {
				position: static !important;
				transform: none !important;
				left: auto !important;
				bottom: auto !important;
				width: 100% !important;
				border-radius: 16px !important;
				box-sizing: border-box;
				position: relative !important;
				padding: 20px;
				position: fixed;
				left: 50%;
				transform: translateX(-50%);
				bottom: 0;
				width: 100%;
				border-radius: 16px 16px 0 0;
				z-index: 1200;
				background: #0f172a;
			}

			.player-head {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 16px;
			}

			.player-controls {
				display: flex;
				align-items: center;
				gap: 10px;
				flex-wrap: wrap;
			}

			.player-controls button {
				border: 0;
				background: #0ea5e9;
				color: white;
				border-radius: 50%;
				width: 44px;
				height: 44px;
				font-size: 1rem;
				cursor: pointer;
			}

			.favorite-button {
				position: absolute;
				top: 14px;
				right: 14px;
				border: 0;
				background: transparent;
				color: #94a3b8;
				font-size: 1.4rem;
				cursor: pointer;
				line-height: 1;
				padding: 4px;
			}

			.favorite-button.is-active {
				color: #facc15;
			}

			.spinner {
				display: none;
				width: 20px;
				height: 20px;
				border: 2px solid rgba(148, 163, 184, 0.3);
				border-top-color: rgba(56, 189, 248, 0.8);
				border-radius: 50%;
				animation: spin 0.8s linear infinite;
				margin-left: 8px;
				display: inline-block;
			}

			.spinner.hidden {
				display: none;
			}

			.status {
				margin-top: 10px;
				color: #7dd3fc;
				min-height: 1.3em;
			}

			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}

			@media (max-width: 470px) {
				.player-controls button {
					border: 0;
					background: #0ea5e9;
					color: white;
					border-radius: 50%;
					width: 30px;
					height: 30px;
					font-size: 1rem;
					cursor: pointer;
				}
			}
		</style>
	</head>
	<body>
		<section class="player-card">
			<button id="favoriteButton" type="button" class="favorite-button" aria-label="Ajouter aux favoris">☆</button>
			<div class="player-head">
				<div>
					<strong id="nowPlaying">Aucune lecture en cours</strong>
					<div class="spinner hidden" id="loadingSpinner" aria-label="Chargement en cours"></div>
					<div id="nowPlayingMeta" class="status">Selectionnez un titre dans la bibliotheque</div>
					<div id="nextPlaying" class="status">Prochaine musique: aucune</div>
				</div>
			</div>
			<div class="player-controls">
				<button id="prevButton" type="button">⏮</button>
				<button id="playButton" type="button">▶</button>
				<button id="nextButton" type="button">⏭</button>
				<input id="seekBar" type="range" min="0" max="100" value="0" />
				<span id="timeLabel">00:00 / 00:00</span>
			</div>
			<audio id="audioPlayer"></audio>
		</section>

		<script>
			const playButton = document.getElementById('playButton');
			const prevButton = document.getElementById('prevButton');
			const nextButton = document.getElementById('nextButton');
			const seekBar = document.getElementById('seekBar');
			const timeLabel = document.getElementById('timeLabel');
			const nowPlaying = document.getElementById('nowPlaying');
			const nowPlayingMeta = document.getElementById('nowPlayingMeta');
			const nextPlaying = document.getElementById('nextPlaying');
			const loadingSpinner = document.getElementById('loadingSpinner');
			const favoriteButton = document.getElementById('favoriteButton');
			const audio = document.getElementById('audioPlayer');
			const playerCard = document.querySelector('.player-card');

			let wakeLock = null;

			async function requestWakeLock() {
				if (!navigator.wakeLock) {
					return;
				}

				try {
					wakeLock = await navigator.wakeLock.request('screen');
					console.log('Wake Lock acquired');
				} catch (error) {
					console.debug('Wake Lock request failed:', error);
				}
			}

			function releaseWakeLock() {
				if (!wakeLock) {
					return;
				}

				try {
					wakeLock.release();
					wakeLock = null;
					console.log('Wake Lock released');
				} catch (error) {
					console.debug('Wake Lock release failed:', error);
				}
			}

			function setFavoriteState(isFavorite) {
				favoriteButton.textContent = isFavorite ? '★' : '☆';
				favoriteButton.classList.toggle('is-active', Boolean(isFavorite));
				favoriteButton.setAttribute('aria-label', isFavorite ? 'Retirer des favoris' : 'Ajouter aux favoris');
			}

			function showLoadingSpinner() {
				loadingSpinner.classList.remove('hidden');
			}

			function hideLoadingSpinner() {
				loadingSpinner.classList.add('hidden');
			}

			function postToParent(type, payload = {}) {
				window.parent.postMessage({ source: 'lecteur', type, ...payload }, '*');
			}

			function formatTime(seconds) {
				if (!Number.isFinite(seconds)) {
					return '00:00';
				}
				const safeSeconds = Math.max(0, Math.floor(seconds));
				const minutes = Math.floor(safeSeconds / 60);
				const remaining = safeSeconds % 60;
				return `${String(minutes).padStart(2, '0')}:${String(remaining).padStart(2, '0')}`;
			}

			function getPlayedSeconds(media) {
				const ranges = media.played;
				let total = 0;
				for (let index = 0; index < ranges.length; index += 1) {
					total += Math.max(0, ranges.end(index) - ranges.start(index));
				}
				return total;
			}

			function updateTimeDisplay() {
				seekBar.max = audio.duration || 100;
				seekBar.value = audio.currentTime || 0;
				timeLabel.textContent = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;

				postToParent('TIME_UPDATE', {
					currentTime: audio.currentTime || 0,
					duration: audio.duration || 0,
					playedSeconds: getPlayedSeconds(audio),
				});
			}

			function toggleLocalPlayback() {
				if (!audio.src) {
					postToParent('REQUEST_PLAY_FALLBACK');
					return;
				}

				if (audio.paused) {
					audio.play().catch(() => {
						postToParent('PLAYER_ERROR', { error: 'Lecture bloquee par le navigateur.' });
					});
					playButton.textContent = '⏸';
				} else {
					audio.pause();
					playButton.textContent = '▶';
				}
			}

			playButton.addEventListener('click', toggleLocalPlayback);
			favoriteButton.addEventListener('click', () => {
				postToParent('TOGGLE_FAVORITE');
			});
			prevButton.addEventListener('click', () => {
				postToParent('REQUEST_PREV');
			});
			nextButton.addEventListener('click', () => {
				postToParent('REQUEST_NEXT');
			});
			seekBar.addEventListener('input', () => {
				if (!audio.duration) {
					return;
				}
				const ratio = Number(seekBar.value) / Number(seekBar.max || 100);
				audio.currentTime = (audio.duration || 0) * ratio;
				updateTimeDisplay();
			});
			audio.addEventListener('timeupdate', updateTimeDisplay);
			audio.addEventListener('loadedmetadata', updateTimeDisplay);
			audio.addEventListener('ended', () => {
				postToParent('REQUEST_NEXT');
			});
			audio.addEventListener('play', () => {
				playButton.textContent = '⏸';
				void requestWakeLock();
			});
			audio.addEventListener('pause', () => {
				playButton.textContent = '▶';
				releaseWakeLock();
			});

			playerCard.addEventListener('click', (event) => {
				const target = event.target;
				if (
					target instanceof Element
					&& (target.closest('button') || target.closest('input') || target.closest('audio'))
				) {
					return;
				}

				postToParent('OPEN_DESCRIPTION');
			});

			window.addEventListener('message', (event) => {
				const message = event.data;
				if (!message || message.target !== 'lecteur') {
					return;
				}

				if (message.type === 'SHOW_LOADING') {
					showLoadingSpinner();
					return;
				}

				if (message.type === 'HIDE_LOADING') {
					hideLoadingSpinner();
					return;
				}

				if (message.type === 'LOAD_TRACK') {
					hideLoadingSpinner();
					nowPlaying.textContent = String(message.title || 'Aucune lecture en cours');
					nowPlayingMeta.textContent = String(message.meta || 'Bibliotheque locale');
					setFavoriteState(Boolean(message.isFavorite));
					audio.src = String(message.src || '');
					audio.load();
					audio.play().catch(() => {
						postToParent('PLAYER_ERROR', { error: 'Lecture bloquee par le navigateur.' });
					});
					void requestWakeLock();
					return;
				}

				if (message.type === 'TOGGLE') {
					toggleLocalPlayback();
					return;
				}

				if (message.type === 'SET_PLAY_PAUSE_ICON') {
					playButton.textContent = message.isPlaying ? '⏸' : '▶';
					if (message.isPlaying) {
						void requestWakeLock();
					} else {
						releaseWakeLock();
					}
					return;
				}

				if (message.type === 'SET_NEXT_TRACK') {
					const nextTitle = String(message.nextTitle || '').trim();
					nextPlaying.textContent = nextTitle
						? `Prochaine musique: ${nextTitle}`
						: 'Prochaine musique: aucune';
					return;
				}

				if (message.type === 'SET_FAVORITE_STATE') {
					setFavoriteState(Boolean(message.isFavorite));
				}
			});

			// Gérer la visibilité de la page (quand on quitte et revient à l'app)
			document.addEventListener('visibilitychange', () => {
				if (document.hidden) {
					// La page est cachée, on peut garder le WakeLock si la musique joue
					// (aucune action nécessaire, le WakeLock continue)
				} else {
					// La page est visible à nouveau
					if (!audio.paused) {
						void requestWakeLock();
					}
				}
			});

			setFavoriteState(false);
			postToParent('PLAYER_READY');
		</script>
	</body>
</html>
