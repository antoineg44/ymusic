<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Liste des playlists - YMusic</title>
		<link rel="stylesheet" href="css/colors.css" />
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				background: var(--background);
				color-scheme: dark;
				font-family: Inter, Arial, sans-serif;
				color: #e2e8f0;
			}

			.playlists-page {
				max-width: 1300px;
				margin: 0 auto;
			}

			.playlists-head {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 12px;
				margin-bottom: 16px;
			}

			.content-grid {
				display: grid;
				grid-template-columns: 360px 1fr;
				gap: 16px;
			}

			.card {
				background: rgba(30, 41, 59, 0.7);
				border: 1px solid rgba(148, 163, 184, 0.15);
				border-radius: 12px;
				padding: 12px;
			}


			.playlists-table {
				width: 100%;
				border-collapse: collapse;
			}

			.playlists-table th,
			.playlists-table td {
				text-align: left;
				border-bottom: 1px solid rgba(148, 163, 184, 0.2);
				padding: 10px;
				vertical-align: top;
			}

			.playlists-table th {
				color: #94a3b8;
				font-weight: 600;
			}

			.playlist-row.is-active {
				background: rgba(56, 189, 248, 0.1);
			}

			.playlist-user-link {
				color: #7dd3fc;
				text-decoration: none;
			}

			.playlist-user-link:hover {
				text-decoration: underline;
			}

			.playlist-open-btn {
				border: 0;
				border-radius: 999px;
				padding: 6px 10px;
				cursor: pointer;
				background: #38bdf8;
				color: #082f49;
				font-weight: 700;
			}

			.musiques-table {
				width: 100%;
				border-collapse: collapse;
			}

			.musiques-table th,
			.musiques-table td {
				text-align: left;
				border-bottom: 1px solid rgba(148, 163, 184, 0.2);
				padding: 10px;
				white-space: nowrap;
			}

			.play-btn {
				border: 0;
				border-radius: 999px;
				padding: 6px 10px;
				cursor: pointer;
				background: #38bdf8;
				color: #082f49;
				font-weight: 700;
			}

			.status {
				margin: 0;
				color: #7dd3fc;
			}

			.hidden {
				display: none;
			}

			.songs-head {
				display: flex;
				align-items: center;
				gap: 10px;
				margin-bottom: 10px;
			}

			.back-btn {
				border: 0;
				border-radius: 999px;
				padding: 6px 10px;
				cursor: pointer;
				background: rgba(56, 189, 248, 0.2);
				color: #7dd3fc;
				font-weight: 700;
			}

			.duplicate-btn {
				border: 0;
				border-radius: 999px;
				padding: 6px 10px;
				cursor: pointer;
				background: #22c55e;
				color: #052e16;
				font-weight: 700;
			}

			.play-all-btn {
				border: 0;
				border-radius: 999px;
				padding: 6px 10px;
				cursor: pointer;
				background: #38bdf8;
				color: #082f49;
				font-weight: 700;
			}

			.playlist-tracks {
				list-style: none;
				margin: 0;
				padding: 0;
				display: flex;
				flex-direction: column;
				gap: 10px;
			}

			.playlist-tracks li {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 10px;
				background: rgba(30, 41, 59, 0.7);
				border: 1px solid rgba(148, 163, 184, 0.15);
				border-radius: 12px;
				padding: 10px 12px;
			}

			.track-info {
				display: flex;
				flex-direction: column;
				overflow: hidden;
				flex: 1;
			}

			.track-info strong {
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.track-info small {
				color: #94a3b8;
			}

			.actions {
				display: flex;
				gap: 8px;
			}

			@media (max-width: 980px) {
				.content-grid {
					grid-template-columns: 1fr;
				}
			}
		</style>
	</head>
	<body>
		<main class="playlists-page">
			<section class="playlists-head">
				<div>
					<p id="playlistsStatus" class="status">Chargement des playlists...</p>
				</div>
			</section>

			<section class="content-grid">
				<article id="playlistsCard" class="card" aria-label="Liste des playlists">
					<h2>Playlists</h2>
					<div class="musiques-table-wrap">
						<table class="playlists-table" aria-label="Playlists de la communauté">
							<thead>
								<tr>
									<th>ID</th>
									<th>Nom</th>
									<th>Description</th>
									<th>Date derniere modification</th>
									<th>Vues</th>
									<th>Utilisateur</th>
									<th>Action</th>
								</tr>
							</thead>
							<tbody id="playlistsBody"></tbody>
						</table>
					</div>
				</article>

				<article id="songsCard" class="card hidden" aria-label="Musiques de la playlist">
					<div class="songs-head">
						<button id="backToPlaylistsButton" class="back-btn" type="button">← Retour</button>
						<button id="playAllButton" class="play-all-btn" type="button">Lire tout</button>
						<button id="duplicatePlaylistButton" class="duplicate-btn" type="button">Dupliquer</button>
						<h2 id="songsTitle">Musiques</h2>
					</div>
					<ul id="songsList" class="playlist-tracks" aria-label="Musiques de playlist"></ul>
				</article>
			</section>
		</main>

		<script src="js/display.js"></script>
		<script>
			const playlistsStatus = document.getElementById('playlistsStatus');
			const playlistsBody = document.getElementById('playlistsBody');
			const songsList = document.getElementById('songsList');
			const songsTitle = document.getElementById('songsTitle');
			const playlistsCard = document.getElementById('playlistsCard');
			const songsCard = document.getElementById('songsCard');
			const backToPlaylistsButton = document.getElementById('backToPlaylistsButton');
			const playAllButton = document.getElementById('playAllButton');
			const duplicatePlaylistButton = document.getElementById('duplicatePlaylistButton');

			let activePlaylistId = '';
			let openedPlaylistName = '';
			let openedPlaylistDescription = '';
			let openedPlaylistSongs = [];

			function postToParent(type, payload = {}) {
				window.parent.postMessage({ source: 'liste', type, ...payload }, '*');
			}

			function escapeHtml(value) {
				return String(value ?? '')
					.replace(/&/g, '&amp;')
					.replace(/</g, '&lt;')
					.replace(/>/g, '&gt;')
					.replace(/\"/g, '&quot;');
			}

			function setStatus(message, isError = false) {
				playlistsStatus.textContent = message;
				playlistsStatus.style.color = isError ? '#fca5a5' : '#7dd3fc';
			}

			function showPlaylistsView() {
				playlistsCard.classList.remove('hidden');
				songsCard.classList.add('hidden');
				songsTitle.textContent = 'Musiques';
				songsList.innerHTML = '';
				openedPlaylistSongs = [];
			}

			function showSongsView() {
				playlistsCard.classList.add('hidden');
				songsCard.classList.remove('hidden');
			}

			function formatMeta(playlist) {
				const total = Number(playlist.TotalMusiques || 0);
				return `${total} musique(s)`;
			}

			function formatDate(value) {
				if (!value) {
					return '-';
				}

				return String(value).replace('T', ' ');
			}

			function renderUserLink(playlist) {
				const userId = Number(playlist.Utilisateur || 0);
				const userName = String(playlist.UtilisateurNom || '').trim();

				if (!userId) {
					return escapeHtml(userName || '-');
				}

				const label = userName ? `${escapeHtml(userName)} (${userId})` : String(userId);
				return `<a class="playlist-user-link" href="users.html#user-${userId}">${label}</a>`;
			}

			function renderPlaylists(playlists) {
				playlistsBody.innerHTML = '';

				if (!playlists.length) {
					playlistsBody.innerHTML = '<tr><td colspan="7">Aucune playlist en base.</td></tr>';
					return;
				}

				playlists.forEach((playlist) => {
					const id = Number(playlist.PlaylistId || 0);
					const tr = document.createElement('tr');
					tr.className = `playlist-row ${activePlaylistId === id ? 'is-active' : ''}`;
					tr.dataset.id = String(id);
					tr.innerHTML = `
						<td>${id || '-'}</td>
						<td>${escapeHtml(playlist.NomPlaylist || 'Playlist')}</td>
						<td>${escapeHtml(playlist.Description || '')}</td>
						<td>${escapeHtml(formatDate(playlist.DateDerniereModification))}</td>
						<td>${Number(playlist.NombreVue || 0)}</td>
						<td>${renderUserLink(playlist)}</td>
						<td><button type="button" class="playlist-open-btn">Ouvrir</button></td>
					`;

					tr.querySelector('.playlist-open-btn').addEventListener('click', () => {
						activePlaylistId = id;
						openedPlaylistName = String(playlist.NomPlaylist || String(id));
						openedPlaylistDescription = String(playlist.Description || '');
						showSongsView();
						void loadPlaylistSongs(String(id), playlist.NomPlaylist || String(id));
						const allRows = playlistsBody.querySelectorAll('.playlist-row');
						allRows.forEach((el) => el.classList.remove('is-active'));
						tr.classList.add('is-active');
					});

					playlistsBody.appendChild(tr);
				});
			}

			function renderSongs(rows) {
				songsList.innerHTML = '';

				if (!rows.length) {
					songsList.innerHTML = '<li>Aucune musique liee a cette playlist.</li>';
					return;
				}

				rows.forEach((row, index) => {
					const preparedSong = {
						title: String(row.Titre || 'Musique inconnue'),
						artists: row.Artiste ? [String(row.Artiste)] : [],
						duration: Number(row.Duree || 0),
						views: Number(row.NombreVue || 0),
						showIndex: false,
						buttons: {
							buttons: {
								play: {
									type: 'LIST_PLAY_SONG',
									result: row,
									className: 'play-btn',
								},
							},
							source: 'liste',
						},
					};

					const item = renderElement(preparedSong, index);
					songsList.appendChild(item);
				});
			}

			async function loadPlaylistSongs(playlistId, playlistName) {
				try {
					songsTitle.textContent = `Musiques - ${playlistName}`;
					const response = await fetch(`php/interface.php?playlistSongs=1&id=${encodeURIComponent(playlistId)}`, {
						credentials: 'same-origin',
						cache: 'no-store',
					});

					if (response.status === 401) {
						window.location.replace('login.html');
						return;
					}

					const payload = await response.json();
					if (!response.ok || !payload.success) {
						throw new Error(payload.error || 'Impossible de recuperer les musiques de la playlist.');
					}

					const rows = Array.isArray(payload.songs) ? payload.songs : [];
					openedPlaylistSongs = rows;
					renderSongs(rows);
					setStatus(`Playlist "${playlistName}" chargee (${rows.length} musique(s)).`);
				} catch (error) {
					console.error(error);
					openedPlaylistSongs = [];
					setStatus(error.message || 'Erreur de chargement des musiques.', true);
				}
			}

			async function createPlaylistInDatabase(name, description) {
				const safeName = String(name || '').trim();
				if (!safeName) {
					throw new Error('Nom de playlist requis.');
				}

				const body = new URLSearchParams({
					createPlaylist: '1',
					NomPlaylist: safeName,
					Description: String(description || ''),
				});

				const response = await fetch('php/interface.php', {
					method: 'POST',
					credentials: 'same-origin',
					cache: 'no-store',
					body,
				});

				if (response.status === 401) {
					window.location.replace('login.html');
					return 0;
				}

				const payload = await response.json();
				if (!response.ok || !payload.success) {
					throw new Error(payload.error || 'Impossible de creer la playlist.');
				}

				return Number(payload.playlist && payload.playlist.PlaylistId ? payload.playlist.PlaylistId : 0);
			}

			async function addMusicToPlaylist(playlistId, musicId) {
				const body = new URLSearchParams({
					addPlaylistMusic: '1',
					IdPlaylist: String(playlistId),
					IdMusique: String(musicId),
				});

				const response = await fetch('php/interface.php', {
					method: 'POST',
					credentials: 'same-origin',
					cache: 'no-store',
					body,
				});

				if (response.status === 401) {
					window.location.replace('login.html');
					return;
				}

				const payload = await response.json();
				if (!response.ok || !payload.success) {
					throw new Error(payload.error || 'Impossible d\'ajouter une musique a la playlist.');
				}
			}

			async function duplicateOpenedPlaylist() {
				if (!activePlaylistId || !openedPlaylistName) {
					setStatus('Aucune playlist ouverte a dupliquer.', true);
					return;
				}

				const defaultName = `${openedPlaylistName} (copie)`;
				const newName = String(window.prompt('Nom de la playlist dupliquee:', defaultName) || '').trim();
				if (!newName) {
					return;
				}

				try {
					setStatus('Duplication de la playlist en cours...');
					const newPlaylistId = await createPlaylistInDatabase(newName, openedPlaylistDescription);
					if (!newPlaylistId) {
						return;
					}

					const songIds = openedPlaylistSongs
						.map((song) => String((song && song.Id) || '').trim())
						.filter(Boolean);

					let copiedCount = 0;
					for (const songId of songIds) {
						await addMusicToPlaylist(newPlaylistId, songId);
						copiedCount += 1;
					}

					setStatus(`Playlist dupliquee: ${newName} (${copiedCount} musique(s) copiee(s)).`);
				} catch (error) {
					console.error(error);
					setStatus(error.message || 'Impossible de dupliquer la playlist.', true);
				}
			}

			function buildPlaylistQueueTracks(rows) {
				return rows
					.map((row) => {
						const videoId = String((row && row.Id) || '').trim();
						if (!videoId) {
							return null;
						}

						const artist = String((row && row.Artiste) || '').trim();
						return {
							videoId,
							title: String((row && row.Titre) || 'Musique inconnue').trim(),
							artists: artist ? [artist] : [],
							duration: Number((row && row.Duree) || 0),
							views: Number((row && row.NombreVue) || 0),
						};
					})
					.filter(Boolean);
			}

			function playAllOpenedPlaylist() {
				if (!activePlaylistId || !openedPlaylistName) {
					setStatus('Aucune playlist ouverte a lire.', true);
					return;
				}

				const tracks = buildPlaylistQueueTracks(openedPlaylistSongs);
				if (!tracks.length) {
					setStatus('Aucune musique disponible dans cette playlist.', true);
					return;
				}

				window.parent.postMessage(
					{
						source: 'playlists',
						type: 'PLAYLIST_LOAD_ALL',
						tracks,
					},
					'*'
				);

				setStatus(`File de lecture remplacee par "${openedPlaylistName}" (${tracks.length} musique(s)).`);
			}

			async function loadPlaylists() {
				try {
					const response = await fetch('php/interface.php?dbPlaylists=1', {
						credentials: 'same-origin',
						cache: 'no-store',
					});

					if (response.status === 401) {
						window.location.replace('login.html');
						return;
					}

					const payload = await response.json();
					if (!response.ok || !payload.success) {
						throw new Error(payload.error || 'Impossible de recuperer la liste des playlists.');
					}

					const playlists = Array.isArray(payload.playlists) ? payload.playlists : [];
					renderPlaylists(playlists);
					showPlaylistsView();
					setStatus(`${playlists.length} playlist(s) chargee(s).`);
				} catch (error) {
					console.error(error);
					setStatus(error.message || 'Erreur de chargement.', true);
				}
			}

			function initEvent() {
				window.addEventListener('message', (event) => {
					const message = event.data;
					if (!message || message.target !== 'listePlaylists') {
						return;
					}

					if (message.type === 'REFRESH_LISTE_PLAYLISTS') {
						void loadPlaylists();
					}
				});
			}

			function init() {
				playAllButton.addEventListener('click', () => {
					playAllOpenedPlaylist();
				});
				duplicatePlaylistButton.addEventListener('click', () => {
					void duplicateOpenedPlaylist();
				});
				backToPlaylistsButton.addEventListener('click', () => {
					showPlaylistsView();
				});
				showPlaylistsView();
				void loadPlaylists();
				initEvent();
			}

			init();
		</script>
	</body>
</html>
