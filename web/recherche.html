<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recherche</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
      }

      .search-embed {
        background: transparent;
        border: 0;
        box-shadow: none;
        border-radius: 0;
        padding: 0;
      }

      .search-results {
        list-style: none;
        margin: 12px 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .search-results li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 12px;
        padding: 10px 12px;
      }

      .search-results li.search-result-present {
        background: rgba(56, 189, 248, 0.28);
        border-color: rgba(14, 165, 233, 0.8);
      }

      .search-results li.search-result-missing {
        background: #ffffff;
        border-color: rgba(148, 163, 184, 0.6);
      }

      .search-results li.search-result-missing .track-info strong,
      .search-results li.search-result-missing .track-info small {
        color: #0f172a;
      }

      .spinner {
        display: none;
        width: 24px;
        height: 24px;
        border: 3px solid rgba(148, 163, 184, 0.3);
        border-top-color: rgba(56, 189, 248, 0.8);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 8px 0;
      }

      .spinner.visible {
        display: inline-block;
      }

      #searchButton .search-button-icon {
        display: none;
        line-height: 1;
      }

      #searchButton.is-icon-only {
        min-width: 44px;
        padding-left: 10px;
        padding-right: 10px;
      }

      #searchButton.is-icon-only .search-button-label {
        display: none;
      }

      #searchButton.is-icon-only .search-button-icon {
        display: inline-block;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <section class="search-embed">
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Rechercher une chanson ou un artiste" />
        <button id="searchButton" type="button">
          <span class="search-button-label">Rechercher</span>
          <span class="search-button-icon" aria-hidden="true">🔍</span>
        </button>
      </div>
      <div id="suggestions" class="suggestions" aria-live="polite"></div>
      <div id="suggestionsSpinner" class="spinner" aria-label="Chargement des suggestions"></div>
      <div id="searchStatus" class="status"></div>
      <div id="searchSpinner" class="spinner" aria-label="Recherche en cours"></div>
      <ul id="searchResults" class="search-results"></ul>
    </section>

    <script src="js/display.js"></script>
    <script>
      let suggestionTimer = null;
      let suggestionRequestInFlight = false;
      let queuedSuggestionQuery = null;
      const MIN_INPUT_WIDTH_WITH_LABEL = 220;

      const searchRow = document.querySelector('.search-row');
      const searchEmbed = document.querySelector('.search-embed');
      const searchInput = document.getElementById('searchInput');
      const searchButton = document.getElementById('searchButton');
      const suggestionsBox = document.getElementById('suggestions');
      const suggestionsSpinner = document.getElementById('suggestionsSpinner');
      const statusBox = document.getElementById('searchStatus');
      const searchSpinner = document.getElementById('searchSpinner');
      const searchResults = document.getElementById('searchResults');
      let lastSentHeight = 0;

      function postToParent(type, payload = {}) {
        window.parent.postMessage({ source: 'recherche', type, ...payload }, '*');
      }

      function updateSearchButtonLayout() {
        if (!searchRow || !searchButton) {
          return;
        }

        searchButton.classList.remove('is-icon-only');
        searchButton.removeAttribute('aria-label');

        const rowStyle = window.getComputedStyle(searchRow);
        const gapValue = rowStyle.columnGap || rowStyle.gap || '10px';
        const gap = Number.parseFloat(gapValue) || 10;
        const requiredWidth = searchButton.offsetWidth + MIN_INPUT_WIDTH_WITH_LABEL + gap;
        const shouldUseIconOnly = searchRow.clientWidth < requiredWidth;

        searchButton.classList.toggle('is-icon-only', shouldUseIconOnly);
        if (shouldUseIconOnly) {
          searchButton.setAttribute('aria-label', 'Rechercher');
        }
      }

      function notifyParentHeight() {
        window.requestAnimationFrame(() => {
          const embedHeight = searchEmbed instanceof HTMLElement ? searchEmbed.scrollHeight : 0;
          const bodyHeight = document.body ? document.body.scrollHeight : 0;
          const height = Math.max(embedHeight, bodyHeight, 1);

          if (height !== lastSentHeight) {
            lastSentHeight = height;
            postToParent('SEARCH_RESIZE', { height });
          }
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\"/g, '&quot;');
      }

      function setStatus(message) {
        statusBox.textContent = message;
        //statusBox.style.color = "#FF0000";
        notifyParentHeight();
      }

      function showSuggestionsSpinner() {
        suggestionsSpinner.classList.add('visible');
        notifyParentHeight();
      }

      function hideSuggestionsSpinner() {
        suggestionsSpinner.classList.remove('visible');
        notifyParentHeight();
      }

      function showSearchSpinner() {
        searchSpinner.classList.add('visible');
        notifyParentHeight();
      }

      function hideSearchSpinner() {
        searchSpinner.classList.remove('visible');
        notifyParentHeight();
      }

      async function checkMusicInDatabase(result) {
        const id = String((result && result.videoId) || '').trim();
        if (!id) {
          return false;
        }

        const title = String((result && result.title) || '').trim();
        const artist = Array.isArray(result && result.artists)
          ? String(result.artists[0] || '').trim()
          : '';

        const requestParams = new URLSearchParams({
          musicDetails: '1',
          id,
        });

        if (title) {
          requestParams.set('title', title);
        }

        if (artist) {
          requestParams.set('artist', artist);
        }

        try {
          const response = await fetch(`php/interface.php?${requestParams.toString()}`, {
            credentials: 'same-origin',
            cache: 'no-store',
          });

          if (response.status === 401) {
            window.location.replace('login.html');
            return false;
          }

          const payload = await response.json();
          return Boolean(response.ok && payload.success && payload.found === true);
        } catch (error) {
          console.debug('Presence check failed for search result:', error);
          return false;
        }
      }

      async function requestSuggestions(query) {
        try {
          showSuggestionsSpinner();
          const response = await fetch(`php/interface.php?suggestions=${encodeURIComponent(query)}`);
          const payload = await response.json();
          if (query === searchInput.value.trim()) {
            renderSuggestions(payload.suggestions || []);
          }
        } catch (error) {
          console.error(error);
        } finally {
          hideSuggestionsSpinner();
        }
      }

      async function processSuggestionQueue() {
        if (suggestionRequestInFlight) {
          return;
        }

        while (queuedSuggestionQuery !== null) {
          const query = queuedSuggestionQuery;
          queuedSuggestionQuery = null;

          if (!query) {
            renderSuggestions([]);
            continue;
          }

          suggestionRequestInFlight = true;
          try {
            await requestSuggestions(query);
          } finally {
            suggestionRequestInFlight = false;
          }
        }
      }

      function enqueueSuggestions(query) {
        queuedSuggestionQuery = query;
        void processSuggestionQueue();
      }

      async function searchMusic() {
        const query = searchInput.value.trim();

        if (!query) {
          setStatus('Saisissez un terme de recherche.');
          return;
        }

        setStatus(`Recherche de "${query}"...`);
        suggestionsBox.innerHTML = '';
        showSearchSpinner();

        try {
          const response = await fetch(`php/interface.php?query=${encodeURIComponent(query)}`);
          const payload = await response.json();

          if (!payload.success) {
            setStatus(payload.error || 'Recherche impossible.');
            searchResults.innerHTML = '<li>Aucun resultat disponible.</li>';
            return;
          }

          const results = payload.results || [];
          await renderSearchResults(results);
        } catch (error) {
          console.error(error);
          setStatus('La recherche YouTube Music a echoue.');
        } finally {
          hideSearchSpinner();
        }
      }

      function renderSuggestions(suggestions) {
        if (!suggestions.length) {
          suggestionsBox.innerHTML = '';
          notifyParentHeight();
          return;
        }

        suggestionsBox.innerHTML = '';
        suggestions.forEach((suggestion) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'suggestion-chip';
          button.textContent = suggestion;
          button.addEventListener('click', () => {
            searchInput.value = suggestion;
            searchMusic();
          });
          suggestionsBox.appendChild(button);
        });
        notifyParentHeight();
      }

      async function renderSearchResults(results) {
        if (!results.length) {
          searchResults.innerHTML = '<li>Aucun resultat trouve.</li>';
          notifyParentHeight();
          return;
        }

        searchResults.innerHTML = '';
        const renderedItems = [];

        results.forEach((result, index) => {
          const preparedResult = {
            ...result,
            title: result.title || 'Titre inconnu',
            artists: Array.isArray(result.artists) ? result.artists : [],
            duration: result.duration || 0,
            views: result.views || 0,
            showIndex: false,
            buttons: {
              buttons: {
                play: {
                  type: 'SEARCH_PLAY_RESULT',
                  result,
                  className: 'queue-action',
                },
              },
              source: 'recherche',
            },
          };

          const item = renderElement(preparedResult, index);
          searchResults.appendChild(item);
          renderedItems.push({ item, result: preparedResult });
        });

        setStatus(`${results.length} resultat(s) trouve(s). Verification en base...`);

        const checks = await Promise.all(
          renderedItems.map(async ({ item, result }) => {
            const inDatabase = await checkMusicInDatabase(result);
            item.classList.add(inDatabase ? 'search-result-present' : 'search-result-missing');
            return inDatabase;
          })
        );

        const presentCount = checks.filter(Boolean).length;
        setStatus(`${results.length} resultat(s) trouve(s) via YouTube Music. ${presentCount} present(s) en base.`);
        notifyParentHeight();
      }

      searchButton.addEventListener('click', () => {
        void searchMusic();
      });

      searchInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          void searchMusic();
        }
      });

      searchInput.addEventListener('input', (event) => {
        const query = event.target.value.trim();

        if (!query) {
          window.clearTimeout(suggestionTimer);
          queuedSuggestionQuery = null;
          suggestionsBox.innerHTML = '';
          notifyParentHeight();
          return;
        }

        window.clearTimeout(suggestionTimer);
        suggestionTimer = window.setTimeout(() => {
          enqueueSuggestions(query);
        }, 250);
      });

      postToParent('SEARCH_READY');
      notifyParentHeight();
      updateSearchButtonLayout();
      window.addEventListener('load', notifyParentHeight);
      window.addEventListener('resize', () => {
        notifyParentHeight();
        updateSearchButtonLayout();
      });

      if (window.ResizeObserver && searchRow) {
        const searchRowObserver = new ResizeObserver(() => {
          updateSearchButtonLayout();
        });
        searchRowObserver.observe(searchRow);
      }
    </script>
  </body>
</html>
