<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Playlists</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
      }

      .search-embed {
        background: transparent;
        border: 0;
        box-shadow: none;
        border-radius: 0;
        padding: 0;
      }

      .search-results {
        list-style: none;
        margin: 12px 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .search-results li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 12px;
        padding: 10px 12px;
      }

      .playlist-view {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .playlist-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .back-button {
        padding: 8px 16px;
        background: rgba(56, 189, 248, 0.2);
        border: 1px solid rgba(56, 189, 248, 0.5);
        border-radius: 8px;
        color: #38bdf8;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.2s ease;
      }

      .back-button:hover {
        background: rgba(56, 189, 248, 0.3);
      }

      .playlist-title {
        flex: 1;
        color: #dbeafe;
        font-size: 1.2em;
        font-weight: bold;
      }

      .playlist-tracks {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .playlist-tracks li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 12px;
        padding: 10px 12px;
      }

      .track-info {
        flex: 1;
      }

      .hidden {
        display: none;
      }

      .play-btn {
        border: 0;
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
      }

      .play-all-btn {
        border: 0;
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <section id="searchSection" class="panel search-embed">
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Rechercher une playlist YouTube" />
        <button id="searchButton" type="button">Rechercher</button>
      </div>
      <div id="suggestions" class="suggestions" aria-live="polite"></div>
      <div id="searchStatus" class="status"></div>
      <ul id="searchResults" class="search-results"></ul>
    </section>

    <section id="playlistSection" class="panel search-embed hidden">
      <div class="playlist-view">
        <div class="playlist-header">
          <button id="backButton" class="back-button" type="button">← Retour</button>
          <div class="playlist-title" id="playlistTitle"></div>
          <button id="playAllButton" class="play-all-btn" type="button">▶ Lire tout</button>
        </div>
        <div id="playlistStatus" class="status"></div>
        <ul id="playlistTracks" class="playlist-tracks"></ul>
      </div>
    </section>

    <script>
      let suggestionTimer = null;
      let currentPlaylist = null;
      let currentPlaylistTracks = [];

      const searchInput = document.getElementById('searchInput');
      const searchButton = document.getElementById('searchButton');
      const suggestionsBox = document.getElementById('suggestions');
      const statusBox = document.getElementById('searchStatus');
      const searchResults = document.getElementById('searchResults');
      const searchSection = document.getElementById('searchSection');
      const playlistSection = document.getElementById('playlistSection');
      const playlistTitle = document.getElementById('playlistTitle');
      const playlistStatus = document.getElementById('playlistStatus');
      const playlistTracks = document.getElementById('playlistTracks');
      const backButton = document.getElementById('backButton');
      const playAllButton = document.getElementById('playAllButton');

      function postToParent(type, payload = {}) {
        window.parent.postMessage({ source: 'playlists', type, ...payload }, '*');
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\"/g, '&quot;');
      }

      function setStatus(message) {
        statusBox.textContent = message;
      }

      function setPlaylistStatus(message) {
        playlistStatus.textContent = message;
      }

      function showSearchView() {
        searchSection.classList.remove('hidden');
        playlistSection.classList.add('hidden');
        currentPlaylist = null;
      }

      function showPlaylistView(playlist) {
        searchSection.classList.add('hidden');
        playlistSection.classList.remove('hidden');
        currentPlaylist = playlist;
      }

      async function loadSuggestions(query) {
        try {
          const response = await fetch(`php/interface.php?playlistQuery=${encodeURIComponent(query)}`);
          const payload = await response.json();
          renderSuggestions(payload.suggestions || []);
        } catch (error) {
          console.error(error);
        }
      }

      async function searchPlaylists() {
        const query = searchInput.value.trim();

        if (!query) {
          setStatus('Saisissez un terme de recherche.');
          return;
        }

        setStatus(`Recherche de playlists pour "${query}"...`);

        try {
          const response = await fetch(`php/interface.php?playlistQuery=${encodeURIComponent(query)}`);
          const payload = await response.json();

          if (!payload.success) {
            setStatus(payload.error || 'Recherche impossible.');
            searchResults.innerHTML = '<li>Aucun resultat disponible.</li>';
            return;
          }

          const results = payload.results || [];
          const suggestions = payload.suggestions || [];
          renderSuggestions(suggestions);
          renderSearchResults(results);
          setStatus(`${results.length} playlist(s) trouvee(s) via YouTube Music.`);
        } catch (error) {
          console.error(error);
          setStatus('La recherche de playlists a echoue.');
        }
      }

      function renderSuggestions(suggestions) {
        if (!suggestions.length) {
          suggestionsBox.innerHTML = '';
          return;
        }

        suggestionsBox.innerHTML = '';
        suggestions.forEach((suggestion) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'suggestion-chip';
          button.textContent = suggestion;
          button.addEventListener('click', () => {
            searchInput.value = suggestion;
            searchPlaylists();
          });
          suggestionsBox.appendChild(button);
        });
      }

      function renderSearchResults(results) {
        if (!results.length) {
          searchResults.innerHTML = '<li>Aucune playlist trouvee.</li>';
          return;
        }

        searchResults.innerHTML = '';

        results.forEach((result) => {
          const author = String(result.author || '').trim();
          const itemCount = String(result.itemCount || '').trim();
          const metaParts = [];
          if (author) {
            metaParts.push(author);
          }
          if (itemCount) {
            metaParts.push(`${itemCount} titres`);
          }

          const item = document.createElement('li');
          item.innerHTML = `
            <div class="track-info">
              <strong>${escapeHtml(result.title || 'Playlist inconnue')}</strong>
              <small>${escapeHtml(metaParts.join(' · ') || 'Sans informations')}</small>
            </div>
          `;

          item.style.cursor = 'pointer';
          item.addEventListener('click', () => {
            void loadPlaylistTracks(result);
          });

          searchResults.appendChild(item);
        });
      }

      async function savePlayedPlaylist(playlist, tracks) {
        const params = new URLSearchParams({
          savePlayedPlaylist: '1',
          PlaylistId: String(playlist.playlistId || '').trim(),
          NomPlaylist: String(playlist.title || '').trim(),
          UtilisateurCreateur: String(playlist.author || '').trim(),
          MusicIds: JSON.stringify(
            tracks
              .map((track) => String((track && track.videoId) || '').trim())
              .filter(Boolean)
          ),
        });

        const response = await fetch('php/interface.php', {
          method: 'POST',
          credentials: 'same-origin',
          body: params,
        });

        if (response.status === 401) {
          window.location.replace('login.html');
          return;
        }

        const payload = await response.json();
        if (!response.ok || !payload.success) {
          throw new Error(payload.error || 'Impossible d\'enregistrer la playlist en base.');
        }
      }

      async function loadPlaylistTracks(result) {
        const playlistId = String((result && result.playlistId) || '').trim();
        if (!playlistId) {
          setStatus('Impossible de lire cette playlist (Id manquant).');
          return;
        }

        try {
          setPlaylistStatus('Chargement de la playlist...');
          showPlaylistView(result);
          playlistTitle.textContent = String(result.title || 'Playlist inconnue');

          const response = await fetch(`php/interface.php?playlistItems=1&id=${encodeURIComponent(playlistId)}`, {
            credentials: 'same-origin',
            cache: 'no-store',
          });

          if (response.status === 401) {
            window.location.replace('login.html');
            return;
          }

          const payload = await response.json();
          if (!response.ok || !payload.success || !payload.playlist) {
            throw new Error(payload.error || 'Impossible de charger la playlist.');
          }

          const playlist = payload.playlist;
          const tracks = Array.isArray(playlist.tracks) ? playlist.tracks : [];

          await savePlayedPlaylist(
            {
              playlistId,
              title: String(playlist.title || result.title || ''),
              author: String(result.author || ''),
            },
            tracks
          );

          renderPlaylistTracks(tracks);
          setPlaylistStatus('');
        } catch (error) {
          console.error(error);
          setPlaylistStatus(error.message || 'Le chargement de la playlist a echoue.');
        }
      }

      function renderPlaylistTracks(tracks) {
        if (!tracks.length) {
          playlistTracks.innerHTML = '<li>Aucune musique dans cette playlist.</li>';
          currentPlaylistTracks = [];
          return;
        }

        playlistTracks.innerHTML = '';
        currentPlaylistTracks = tracks.filter((track) => track && String((track && track.videoId) || '').trim());

        tracks.forEach((track) => {
          if (!track || !String((track && track.videoId) || '').trim()) {
            return;
          }

          const artists = Array.isArray(track.artists) ? track.artists.join(', ') : '';
          const title = String(track.title || 'Musique inconnue').trim();

          const item = document.createElement('li');
          item.innerHTML = `
            <div class="track-info">
              <strong>${escapeHtml(title)}</strong>
              <small>${escapeHtml(artists || 'Artiste inconnu')}</small>
            </div>
            <div class="actions">
              <button class="play-btn" type="button">▶</button>
            </div>
          `;

          item.querySelector('button').addEventListener('click', () => {
            void playTrack(track);
          });

          playlistTracks.appendChild(item);
        });
      }

      async function playTrack(track) {
        const videoId = String(track.videoId || '').trim();
        if (!videoId) {
          setPlaylistStatus('Impossible de lire cette musique (Id manquant).');
          return;
        }

        postToParent('PLAYLIST_PLAY_RESULT', {
          result: {
            title: String(track.title || ''),
            videoId: videoId,
            artists: Array.isArray(track.artists) ? track.artists : [],
            views: 0,
            album: {
              id: '',
            },
          },
        });

        setPlaylistStatus(`Lecture de "${String(track.title || 'musique')}"...`);
      }

      async function playAllTracks() {
        if (!currentPlaylistTracks || currentPlaylistTracks.length === 0) {
          setPlaylistStatus('Aucune musique a lire dans cette playlist.');
          return;
        }

        const firstTrack = currentPlaylistTracks[0];
        if (!firstTrack || !String(firstTrack.videoId || '').trim()) {
          setPlaylistStatus('Impossible de lire cette playlist (premiere musique invalide).');
          return;
        }

        // Envoyer un message au parent pour charger la playlist complète dans la queue
        postToParent('PLAYLIST_LOAD_ALL', {
          tracks: currentPlaylistTracks,
        });

        setPlaylistStatus(`Chargement de la playlist (${currentPlaylistTracks.length} musiques)...`);
      }

      searchButton.addEventListener('click', () => {
        void searchPlaylists();
      });

      searchInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          void searchPlaylists();
        }
      });

      searchInput.addEventListener('input', (event) => {
        const query = event.target.value.trim();

        if (!query) {
          suggestionsBox.innerHTML = '';
          return;
        }

        window.clearTimeout(suggestionTimer);
        suggestionTimer = window.setTimeout(() => {
          void loadSuggestions(query);
        }, 250);
      });

      backButton.addEventListener('click', () => {
        showSearchView();
      });

      playAllButton.addEventListener('click', () => {
        void playAllTracks();
      });
    </script>
  </body>
</html>
