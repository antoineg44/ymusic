<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Playlists</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
      }

      .search-embed {
        background: transparent;
        border: 0;
        box-shadow: none;
        border-radius: 0;
        padding: 0;
      }

      .search-results {
        list-style: none;
        margin: 12px 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .search-results li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 12px;
        padding: 10px 12px;
      }

      .playlist-view {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .playlist-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .back-button {
        padding: 8px 16px;
        background: rgba(56, 189, 248, 0.2);
        border: 1px solid rgba(56, 189, 248, 0.5);
        border-radius: 8px;
        color: #38bdf8;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.2s ease;
      }

      .back-button:hover {
        background: rgba(56, 189, 248, 0.3);
      }

      .playlist-title {
        flex: 1;
        color: #dbeafe;
        font-size: 1.2em;
        font-weight: bold;
      }

      .playlist-tracks {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .playlist-tracks li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 12px;
        padding: 10px 12px;
      }

      .track-info {
        flex: 1;
      }

      .hidden {
        display: none;
      }

      .play-btn {
        border: 0;
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
      }

      .play-all-btn {
        border: 0;
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
      }

      .duplicate-btn {
        border: 0;
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        background: #22c55e;
        color: #052e16;
        font-weight: 700;
      }

      .busy-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(2, 6, 23, 0.72);
      }

      .busy-overlay.visible {
        display: flex;
      }

      .busy-card {
        min-width: 280px;
        max-width: min(90vw, 560px);
        background: #0f172a;
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
      }

      .busy-spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(148, 163, 184, 0.35);
        border-top-color: #38bdf8;
        border-radius: 50%;
        margin: 0 auto 12px;
        animation: spin 0.8s linear infinite;
      }

      .busy-text {
        color: #e2e8f0;
        font-weight: 700;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <section id="searchSection" class="panel search-embed">
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Rechercher une playlist YouTube" />
        <button id="searchButton" type="button">Rechercher</button>
      </div>
      <div id="suggestions" class="suggestions" aria-live="polite"></div>
      <div id="searchStatus" class="status"></div>
      <ul id="searchResults" class="search-results"></ul>
    </section>

    <section id="playlistSection" class="panel search-embed hidden">
      <div class="playlist-view">
        <div class="playlist-header">
          <button id="backButton" class="back-button" type="button">← Retour</button>
          <div class="playlist-title" id="playlistTitle"></div>
          <button id="playAllButton" class="play-all-btn" type="button">▶ Lire tout</button>
          <button id="duplicatePlaylistButton" class="duplicate-btn" type="button">Dupliquer</button>
        </div>
        <div id="playlistStatus" class="status"></div>
        <ul id="playlistTracks" class="playlist-tracks"></ul>
      </div>
    </section>

    <div id="busyOverlay" class="busy-overlay" aria-hidden="true">
      <div class="busy-card" role="status" aria-live="polite">
        <div class="busy-spinner" aria-hidden="true"></div>
        <div id="busyText" class="busy-text">Traitement en cours...</div>
      </div>
    </div>

    <script>
      let suggestionTimer = null;
      let currentPlaylist = null;
      let currentPlaylistTracks = [];

      const searchInput = document.getElementById('searchInput');
      const searchButton = document.getElementById('searchButton');
      const suggestionsBox = document.getElementById('suggestions');
      const statusBox = document.getElementById('searchStatus');
      const searchResults = document.getElementById('searchResults');
      const searchSection = document.getElementById('searchSection');
      const playlistSection = document.getElementById('playlistSection');
      const playlistTitle = document.getElementById('playlistTitle');
      const playlistStatus = document.getElementById('playlistStatus');
      const playlistTracks = document.getElementById('playlistTracks');
      const backButton = document.getElementById('backButton');
      const playAllButton = document.getElementById('playAllButton');
      const duplicatePlaylistButton = document.getElementById('duplicatePlaylistButton');
      const busyOverlay = document.getElementById('busyOverlay');
      const busyText = document.getElementById('busyText');
      const interactiveElements = Array.from(document.querySelectorAll('button, input'));
      let isBusy = false;

      function postToParent(type, payload = {}) {
        window.parent.postMessage({ source: 'playlists', type, ...payload }, '*');
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\"/g, '&quot;');
      }

      function setStatus(message) {
        statusBox.textContent = message;
      }

      function setPlaylistStatus(message) {
        playlistStatus.textContent = message;
      }

      function setBusyState(busy, message) {
        isBusy = Boolean(busy);

        if (busyText) {
          busyText.textContent = String(message || 'Traitement en cours...');
        }

        if (busyOverlay) {
          busyOverlay.classList.toggle('visible', isBusy);
          busyOverlay.setAttribute('aria-hidden', isBusy ? 'false' : 'true');
        }

        interactiveElements.forEach((element) => {
          if (!(element instanceof HTMLButtonElement || element instanceof HTMLInputElement)) {
            return;
          }

          if (isBusy) {
            element.dataset.wasDisabled = element.disabled ? '1' : '0';
            element.disabled = true;
            return;
          }

          const wasDisabled = element.dataset.wasDisabled === '1';
          element.disabled = wasDisabled;
          delete element.dataset.wasDisabled;
        });
      }

      function showSearchView() {
        searchSection.classList.remove('hidden');
        playlistSection.classList.add('hidden');
        currentPlaylist = null;
      }

      function showPlaylistView(playlist) {
        searchSection.classList.add('hidden');
        playlistSection.classList.remove('hidden');
        currentPlaylist = playlist;
      }

      async function loadSuggestions(query) {
        if (isBusy) {
          return;
        }

        try {
          const response = await fetch(`php/interface.php?playlistQuery=${encodeURIComponent(query)}`);
          const payload = await response.json();
          renderSuggestions(payload.suggestions || []);
        } catch (error) {
          console.error(error);
        }
      }

      async function searchPlaylists() {
        if (isBusy) {
          return;
        }

        const query = searchInput.value.trim();

        if (!query) {
          setStatus('Saisissez un terme de recherche.');
          return;
        }

        setStatus(`Recherche de playlists pour "${query}"...`);

        try {
          const response = await fetch(`php/interface.php?playlistQuery=${encodeURIComponent(query)}`);
          const payload = await response.json();

          if (!payload.success) {
            setStatus(payload.error || 'Recherche impossible.');
            searchResults.innerHTML = '<li>Aucun resultat disponible.</li>';
            return;
          }

          const results = payload.results || [];
          const suggestions = payload.suggestions || [];
          renderSuggestions(suggestions);
          renderSearchResults(results);
          setStatus(`${results.length} playlist(s) trouvee(s) via YouTube Music.`);
        } catch (error) {
          console.error(error);
          setStatus('La recherche de playlists a echoue.');
        }
      }

      function renderSuggestions(suggestions) {
        if (!suggestions.length) {
          suggestionsBox.innerHTML = '';
          return;
        }

        suggestionsBox.innerHTML = '';
        suggestions.forEach((suggestion) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'suggestion-chip';
          button.textContent = suggestion;
          button.addEventListener('click', () => {
            searchInput.value = suggestion;
            searchPlaylists();
          });
          suggestionsBox.appendChild(button);
        });
      }

      function renderSearchResults(results) {
        if (!results.length) {
          searchResults.innerHTML = '<li>Aucune playlist trouvee.</li>';
          return;
        }

        searchResults.innerHTML = '';

        results.forEach((result) => {
          const author = String(result.author || '').trim();
          const itemCount = String(result.itemCount || '').trim();
          const metaParts = [];
          if (author) {
            metaParts.push(author);
          }
          if (itemCount) {
            metaParts.push(`${itemCount} titres`);
          }

          const item = document.createElement('li');
          item.innerHTML = `
            <div class="track-info">
              <strong>${escapeHtml(result.title || 'Playlist inconnue')}</strong>
              <small>${escapeHtml(metaParts.join(' · ') || 'Sans informations')}</small>
            </div>
          `;

          item.style.cursor = 'pointer';
          item.addEventListener('click', () => {
            void loadPlaylistTracks(result);
          });

          searchResults.appendChild(item);
        });
      }

      async function savePlayedPlaylist(playlist, tracks) {
        const params = new URLSearchParams({
          savePlayedPlaylist: '1',
          PlaylistId: String(playlist.playlistId || '').trim(),
          NomPlaylist: String(playlist.title || '').trim(),
          UtilisateurCreateur: String(playlist.author || '').trim(),
          MusicIds: JSON.stringify(
            tracks
              .map((track) => String((track && track.videoId) || '').trim())
              .filter(Boolean)
          ),
        });

        const response = await fetch('php/interface.php', {
          method: 'POST',
          credentials: 'same-origin',
          body: params,
        });

        if (response.status === 401) {
          window.location.replace('login.html');
          return;
        }

        const payload = await response.json();
        if (!response.ok || !payload.success) {
          throw new Error(payload.error || 'Impossible d\'enregistrer la playlist en base.');
        }
      }

      async function loadPlaylistTracks(result) {
        const playlistId = String((result && result.playlistId) || '').trim();
        if (!playlistId) {
          setStatus('Impossible de lire cette playlist (Id manquant).');
          return;
        }

        try {
          setPlaylistStatus('Chargement de la playlist...');
          showPlaylistView(result);
          playlistTitle.textContent = String(result.title || 'Playlist inconnue');

          const response = await fetch(`php/interface.php?playlistItems=1&id=${encodeURIComponent(playlistId)}`, {
            credentials: 'same-origin',
            cache: 'no-store',
          });

          if (response.status === 401) {
            window.location.replace('login.html');
            return;
          }

          const payload = await response.json();
          if (!response.ok || !payload.success || !payload.playlist) {
            throw new Error(payload.error || 'Impossible de charger la playlist.');
          }

          const playlist = payload.playlist;
          const tracks = Array.isArray(playlist.tracks) ? playlist.tracks : [];

          await savePlayedPlaylist(
            {
              playlistId,
              title: String(playlist.title || result.title || ''),
              author: String(result.author || ''),
            },
            tracks
          );

          renderPlaylistTracks(tracks);
          setPlaylistStatus('');
        } catch (error) {
          console.error(error);
          setPlaylistStatus(error.message || 'Le chargement de la playlist a echoue.');
        }
      }

      function renderPlaylistTracks(tracks) {
        if (!tracks.length) {
          playlistTracks.innerHTML = '<li>Aucune musique dans cette playlist.</li>';
          currentPlaylistTracks = [];
          return;
        }

        playlistTracks.innerHTML = '';
        currentPlaylistTracks = tracks.filter((track) => track && String((track && track.videoId) || '').trim());

        tracks.forEach((track) => {
          if (!track || !String((track && track.videoId) || '').trim()) {
            return;
          }

          const artists = Array.isArray(track.artists) ? track.artists.join(', ') : '';
          const title = String(track.title || 'Musique inconnue').trim();

          const item = document.createElement('li');
          item.innerHTML = `
            <div class="track-info">
              <strong>${escapeHtml(title)}</strong>
              <small>${escapeHtml(artists || 'Artiste inconnu')}</small>
            </div>
            <div class="actions">
              <button class="play-btn" type="button">▶</button>
            </div>
          `;

          item.querySelector('button').addEventListener('click', () => {
            void playTrack(track);
          });

          playlistTracks.appendChild(item);
        });
      }

      async function playTrack(track) {
        if (isBusy) {
          return;
        }

        const videoId = String(track.videoId || '').trim();
        if (!videoId) {
          setPlaylistStatus('Impossible de lire cette musique (Id manquant).');
          return;
        }

        postToParent('PLAYLIST_PLAY_RESULT', {
          result: {
            title: String(track.title || ''),
            videoId: videoId,
            artists: Array.isArray(track.artists) ? track.artists : [],
            views: 0,
            album: {
              id: '',
            },
          },
        });

        setPlaylistStatus(`Lecture de "${String(track.title || 'musique')}"...`);
      }

      async function playAllTracks() {
        if (isBusy) {
          return;
        }

        if (!currentPlaylistTracks || currentPlaylistTracks.length === 0) {
          setPlaylistStatus('Aucune musique a lire dans cette playlist.');
          return;
        }

        const firstTrack = currentPlaylistTracks[0];
        if (!firstTrack || !String(firstTrack.videoId || '').trim()) {
          setPlaylistStatus('Impossible de lire cette playlist (premiere musique invalide).');
          return;
        }

        // Envoyer un message au parent pour charger la playlist complète dans la queue
        postToParent('PLAYLIST_LOAD_ALL', {
          tracks: currentPlaylistTracks,
        });

        setPlaylistStatus(`Chargement de la playlist (${currentPlaylistTracks.length} musiques)...`);
      }

      async function createDuplicatedPlaylist() {
        const playlistName = String((currentPlaylist && currentPlaylist.title) || '').trim();
        const sourcePlaylistId = String((currentPlaylist && currentPlaylist.playlistId) || '').trim();
        const sourceAuthor = String((currentPlaylist && currentPlaylist.author) || '').trim();

        if (!playlistName || !sourcePlaylistId) {
          throw new Error('Aucune playlist YouTube ouverte a dupliquer.');
        }

        const descriptionParts = ['Dupliquee depuis YouTube'];
        if (sourceAuthor) {
          descriptionParts.push(`createur: ${sourceAuthor}`);
        }
        descriptionParts.push(`source: ${sourcePlaylistId}`);

        const body = new URLSearchParams({
          createPlaylist: '1',
          NomPlaylist: playlistName,
          Description: descriptionParts.join(' | '),
        });

        const response = await fetch('php/interface.php', {
          method: 'POST',
          credentials: 'same-origin',
          cache: 'no-store',
          body,
        });

        if (response.status === 401) {
          window.location.replace('login.html');
          return 0;
        }

        const payload = await response.json();
        if (!response.ok || !payload.success) {
          throw new Error(payload.error || 'Impossible de creer la playlist locale.');
        }

        return Number(payload.playlist && payload.playlist.PlaylistId ? payload.playlist.PlaylistId : 0);
      }

      async function persistTrackForPlaylist(track) {
        const videoId = String((track && track.videoId) || '').trim();
        if (!videoId) {
          throw new Error('Track sans videoId.');
        }

        const musicResponse = await fetch(`php/interface.php?musicId=${encodeURIComponent(videoId)}`, {
          credentials: 'same-origin',
          cache: 'no-store',
        });

        if (musicResponse.status === 401) {
          window.location.replace('login.html');
          throw new Error('Authentification requise.');
        }

        const musicPayload = await musicResponse.json();
        if (!musicResponse.ok || !musicPayload.success) {
          throw new Error(musicPayload.error || `Impossible de telecharger ${videoId}.`);
        }

        const title = String((track && track.title) || '').trim();
        const artist = Array.isArray(track && track.artists) ? String((track.artists[0] || '')).trim() : '';

        const addMusicBody = new URLSearchParams({
          addMusic: '1',
          Id: videoId,
          Titre: title,
          Artiste: artist,
          Album: '',
          Duree: '',
          NombreVue: '',
          DateAjout: new Date().toISOString().slice(0, 19).replace('T', ' '),
        });

        const addMusicResponse = await fetch('php/interface.php', {
          method: 'POST',
          credentials: 'same-origin',
          cache: 'no-store',
          body: addMusicBody,
        });

        if (addMusicResponse.status === 401) {
          window.location.replace('login.html');
          throw new Error('Authentification requise.');
        }

        const addMusicPayload = await addMusicResponse.json();
        if (!addMusicResponse.ok || !addMusicPayload.success) {
          throw new Error(addMusicPayload.error || `Impossible d'ajouter ${videoId} en base.`);
        }

        return videoId;
      }

      async function linkTrackToPlaylist(playlistId, musicId) {
        const body = new URLSearchParams({
          addPlaylistMusic: '1',
          IdPlaylist: String(playlistId),
          IdMusique: String(musicId),
        });

        const response = await fetch('php/interface.php', {
          method: 'POST',
          credentials: 'same-origin',
          cache: 'no-store',
          body,
        });

        if (response.status === 401) {
          window.location.replace('login.html');
          throw new Error('Authentification requise.');
        }

        const payload = await response.json();
        if (!response.ok || !payload.success) {
          throw new Error(payload.error || `Impossible d'associer ${musicId} a la playlist.`);
        }
      }

      async function duplicateCurrentYoutubePlaylist() {
        if (isBusy) {
          return;
        }

        if (!currentPlaylist || !currentPlaylistTracks.length) {
          setPlaylistStatus('Aucune playlist ouverte a dupliquer.');
          return;
        }

        const confirmed = window.confirm(
          `Dupliquer la playlist "${String(currentPlaylist.title || 'Playlist')}" et telecharger ${currentPlaylistTracks.length} musique(s) ?`
        );
        if (!confirmed) {
          return;
        }

        setBusyState(true, 'Duplication en cours...');
        setPlaylistStatus('Duplication en cours...');

        try {
          setBusyState(true, 'Creation de la playlist locale...');
          const newPlaylistId = await createDuplicatedPlaylist();
          if (newPlaylistId <= 0) {
            throw new Error('Creation de la playlist impossible.');
          }

          const total = currentPlaylistTracks.length;
          for (let index = 0; index < total; index += 1) {
            const track = currentPlaylistTracks[index];
            const title = String((track && track.title) || 'musique').trim();
            setBusyState(true, `Traitement ${index + 1}/${total}: ${title}`);

            const musicId = await persistTrackForPlaylist(track);
            await linkTrackToPlaylist(newPlaylistId, musicId);
          }

          setPlaylistStatus(`Playlist dupliquee avec succes (${currentPlaylistTracks.length} musique(s)).`);
          postToParent('REFRESH_ALL_PLAYLISTS');
        } catch (error) {
          console.error(error);
          setPlaylistStatus(String((error && error.message) || 'La duplication a echoue.'));
        } finally {
          setBusyState(false);
        }
      }

      searchButton.addEventListener('click', () => {
        void searchPlaylists();
      });

      searchInput.addEventListener('keydown', (event) => {
        if (isBusy) {
          return;
        }

        if (event.key === 'Enter') {
          void searchPlaylists();
        }
      });

      searchInput.addEventListener('input', (event) => {
        if (isBusy) {
          return;
        }

        const query = event.target.value.trim();

        if (!query) {
          suggestionsBox.innerHTML = '';
          return;
        }

        window.clearTimeout(suggestionTimer);
        suggestionTimer = window.setTimeout(() => {
          void loadSuggestions(query);
        }, 250);
      });

      backButton.addEventListener('click', () => {
        if (isBusy) {
          return;
        }

        showSearchView();
      });

      playAllButton.addEventListener('click', () => {
        void playAllTracks();
      });

      duplicatePlaylistButton.addEventListener('click', () => {
        void duplicateCurrentYoutubePlaylist();
      });
    </script>
  </body>
</html>
