<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Menu playlist</title>
		<link rel="stylesheet" href="css/colors.css" />
		<style>
			html,
			body {
				margin: 0;
				padding: 0;
				background: transparent;
				font-family: Inter, Arial, sans-serif;
				color: #e2e8f0;
				color-scheme: dark;
			}

			.playlist-menu {
				box-sizing: border-box;
				background: #0f172a;
				border: 1px solid rgba(148, 163, 184, 0.22);
				border-radius: 14px;
				box-shadow: 0 18px 40px rgba(2, 6, 23, 0.55);
				padding: 10px;
			}

			.playlist-menu-header {
				margin: 0 0 8px;
				font-size: 0.9rem;
				font-weight: 700;
				color: #dbeafe;
			}

			.playlist-menu-status {
				margin: 0 0 8px;
				font-size: 0.82rem;
				color: #94a3b8;
				min-height: 1.2rem;
			}

			.playlist-menu-list {
				display: flex;
				flex-direction: column;
				gap: 8px;
				max-height: 220px;
				overflow: auto;
			}

			.playlist-menu-item {
				width: 100%;
				text-align: left;
				border: 1px solid rgba(148, 163, 184, 0.22);
				background: rgba(30, 41, 59, 0.84);
				color: #e2e8f0;
				border-radius: 10px;
				padding: 10px 12px;
				cursor: pointer;
			}

			.playlist-menu-item:hover {
				border-color: #38bdf8;
				background: rgba(56, 189, 248, 0.14);
			}

			.playlist-menu-empty {
				padding: 8px 2px 2px;
				font-size: 0.85rem;
				color: #94a3b8;
			}
		</style>
	</head>
	<body>
		<section class="playlist-menu" aria-label="Ajouter une musique à une playlist">
			<p class="playlist-menu-header">Ajouter à une playlist</p>
			<p id="playlistMenuStatus" class="playlist-menu-status">Choisissez une playlist.</p>
			<div id="playlistMenuList" class="playlist-menu-list"></div>
		</section>

		<script>
			const playlistMenuStatus = document.getElementById('playlistMenuStatus');
			const playlistMenuList = document.getElementById('playlistMenuList');

			// Récupérer le musicId depuis l'URL query parameter
			const params = new URLSearchParams(window.location.search);
			let currentMusicId = String(params.get('musicId') || '').trim();

			function postToParent(type, payload = {}) {
				window.parent.postMessage({ source: 'playlistMenu', type, ...payload }, '*');
			}

			function setStatus(message) {
				playlistMenuStatus.textContent = String(message || '');
			}

			function renderPlaylists(items) {
				playlistMenuList.innerHTML = '';

				if (!items.length) {
					playlistMenuList.innerHTML = '<div class="playlist-menu-empty">Aucune playlist disponible.</div>';
					return;
				}

				items.forEach((playlist) => {
					const playlistId = Number(playlist.PlaylistId || 0);
					if (!playlistId) {
						return;
					}

					const button = document.createElement('button');
					button.type = 'button';
					button.className = 'playlist-menu-item';
					const playlistName = String(playlist.NomPlaylist || 'Playlist').trim();
					const total = Number(playlist.TotalMusiques || 0);
					button.textContent = `${playlistName} (${total})`;
					button.addEventListener('click', () => {
						void addCurrentMusicToPlaylist(playlistId, playlistName);
					});
					playlistMenuList.appendChild(button);
				});
			}

			async function loadMyPlaylists() {
				if (!currentMusicId) {
					setStatus('Aucune musique active.');
					renderPlaylists([]);
					return;
				}

				try {
					setStatus('Chargement des playlists...');
					const response = await fetch('php/interface.php?myPlaylists=1', {
						credentials: 'same-origin',
						cache: 'no-store',
					});

					if (response.status === 401) {
						window.location.replace('login.html');
						return;
					}

					const payload = await response.json();
					if (!response.ok || !payload.success) {
						throw new Error(payload.error || 'Impossible de charger vos playlists.');
					}

					const items = Array.isArray(payload.playlists) ? payload.playlists : [];
					renderPlaylists(items);
					setStatus(items.length ? 'Choisissez une playlist.' : 'Aucune playlist personnelle.');
				} catch (error) {
					console.error(error);
					renderPlaylists([]);
					setStatus(error.message || 'Erreur de chargement.');
				}
			}

			async function addCurrentMusicToPlaylist(playlistId, playlistName) {
				const safePlaylistId = Number(playlistId || 0);
				if (!safePlaylistId || !currentMusicId) {
					setStatus('Musique courante introuvable.');
					return;
				}

				try {
					setStatus(`Ajout à ${playlistName}...`);
					const body = new URLSearchParams({
						addPlaylistMusic: '1',
						IdPlaylist: String(safePlaylistId),
						IdMusique: currentMusicId,
					});

					const response = await fetch('php/interface.php', {
						method: 'POST',
						credentials: 'same-origin',
						cache: 'no-store',
						body,
					});

					if (response.status === 401) {
						window.location.replace('login.html');
						return;
					}

					const payload = await response.json();
					if (!response.ok || !payload.success) {
						throw new Error(payload.error || 'Impossible d\'ajouter la musique.');
					}

					setStatus(payload.message || `Ajoute a ${playlistName}.`);
					// Attendre un peu avant de fermer pour montrer le message de succès
					window.setTimeout(() => {
						postToParent('CLOSE_PLAYLIST_MENU');
					}, 800);
				} catch (error) {
					console.error(error);
					setStatus(error.message || 'Erreur lors de l\'ajout.');
				}
			}

			window.addEventListener('message', (event) => {
				const message = event.data;
				if (!message || message.target !== 'playlistMenu') {
					return;
				}

				if (message.type === 'OPEN_MENU') {
					currentMusicId = String(message.musicId || '').trim();
					void loadMyPlaylists();
					return;
				}

				if (message.type === 'CLOSE_MENU') {
					setStatus('Choisissez une playlist.');
				}
			});

			// Charger les playlists si musicId est déjà disponible (via query param)
			if (currentMusicId) {
				void loadMyPlaylists();
			}
		</script>
	</body>
</html>
