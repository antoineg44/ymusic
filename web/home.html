<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accueil</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="css/colors.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
      }

      .home-page {
        padding: 0;
      }

      .home-header {
        margin-bottom: 12px;
      }

      .home-search-row {
        margin-top: 10px;
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .home-search-input {
        flex: 1;
        min-width: 180px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.7);
        color: #e2e8f0;
        padding: 8px 10px;
      }

      .home-search-button {
        border: 0;
        border-radius: 999px;
        padding: 8px 14px;
        cursor: pointer;
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
      }

      .home-reset-button {
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 999px;
        padding: 8px 14px;
        cursor: pointer;
        background: rgba(15, 23, 42, 0.7);
        color: #e2e8f0;
        font-weight: 600;
      }

      .home-header h2 {
        margin: 0;
      }

      .home-status {
        margin: 6px 0 0;
        min-height: 1.2em;
        color: #7dd3fc;
      }

      .home-results {
        list-style: none;
        margin: 12px 0 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .home-results li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 12px;
        padding: 10px 12px;
      }

      .home-results .queue-item-index {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        min-width: 32px;
        height: 32px;
        background: rgba(56, 189, 248, 0.2);
        border-radius: 50%;
        color: #38bdf8;
        font-weight: 700;
        font-size: 0.9rem;
      }

      .home-results .track-info {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-width: 0;
      }

      .home-results .track-info strong,
      .home-results .track-info small {
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .home-results .track-info small {
        color: #94a3b8;
      }

      .home-results .actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        min-width: 40px;
      }

      .home-results .actions button {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 0;
        cursor: pointer;
      }

      .home-empty {
        margin-top: 10px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main class="home-page">
      <div class="home-header">
        <h2>Dernieres musiques ajoutees</h2>
        <div class="home-search-row">
          <input id="homeSearchInput" class="home-search-input" type="text" placeholder="Rechercher un titre dans la table Musiques" />
          <button id="homeSearchButton" class="home-search-button" type="button">Rechercher</button>
          <button id="homeResetButton" class="home-reset-button" type="button">Reinitialiser</button>
        </div>
        <p id="homeStatus" class="home-status">Chargement...</p>
      </div>
      <ul id="homeResults" class="home-results"></ul>
      <p id="homeEmpty" class="home-empty" style="display: none;">Aucune musique en base.</p>
    </main>

    <script src="js/display.js"></script>
    <script>
      const homeResults = document.getElementById('homeResults');
      const homeStatus = document.getElementById('homeStatus');
      const homeEmpty = document.getElementById('homeEmpty');
      const homeSearchInput = document.getElementById('homeSearchInput');
      const homeSearchButton = document.getElementById('homeSearchButton');
      const homeResetButton = document.getElementById('homeResetButton');

      function setStatus(message, isError = false) {
        homeStatus.textContent = message;
        homeStatus.style.color = isError ? '#fca5a5' : '#7dd3fc';
      }

      function toDisplayDuration(rawDuration) {
        if (typeof rawDuration === 'number' && Number.isFinite(rawDuration)) {
          const safeSeconds = Math.max(0, Math.floor(rawDuration));
          const minutes = Math.floor(safeSeconds / 60);
          const seconds = safeSeconds % 60;
          return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        const asText = String(rawDuration || '').trim();
        return asText || '00:00';
      }

      function normalizeMusicRow(row) {
        const id = String((row && row.Id) || '').trim();
        const title = String((row && row.Titre) || '').trim();
        const artist = String((row && row.Artiste) || '').trim();

        return {
          Id: id,
          title,
          artists: artist ? [artist] : [],
          duration: toDisplayDuration(row && row.Duree),
          views: Number(row && row.NombreVue) || 0,
          showIndex: true,
          buttons: {
            source: 'liste',
            buttons: {
              play: {
                type: 'LIST_PLAY_SONG',
                payload: {
                  song: {
                    Id: id,
                    Titre: title,
                    Artiste: artist,
                  },
                },
              },
            },
          },
        };
      }

      async function loadLatestMusiques(titleQuery = '') {
        setStatus('Chargement...');
        homeResults.innerHTML = '';
        homeEmpty.style.display = 'none';

        try {
          const params = new URLSearchParams({
            musiques: '1',
            sortBy: 'DateAjout',
            sortDir: 'desc',
            page: '1',
            perPage: '5',
          });

          const trimmedTitleQuery = String(titleQuery || '').trim();
          if (trimmedTitleQuery) {
            params.set('titleQuery', trimmedTitleQuery);
          }

          const response = await fetch(`php/interface.php?${params.toString()}`, {
            credentials: 'same-origin',
            cache: 'no-store',
          });

          if (response.status === 401) {
            window.location.replace('login.html');
            return;
          }

          const payload = await response.json();
          if (!response.ok || !payload.success) {
            throw new Error(payload.error || 'Impossible de charger les musiques');
          }

          const musiques = Array.isArray(payload.musiques) ? payload.musiques : [];
          if (musiques.length === 0) {
            if (trimmedTitleQuery) {
              setStatus(`Aucun resultat pour "${trimmedTitleQuery}".`);
            } else {
              setStatus('Aucune musique trouvee.');
            }
            homeEmpty.style.display = 'block';
            return;
          }

          musiques.forEach((row, index) => {
            const preparedSong = normalizeMusicRow(row);
            preparedSong.displayIndex = index + 1;
            const item = renderElement(preparedSong, index);
            homeResults.appendChild(item);
          });

          if (trimmedTitleQuery) {
            setStatus(`5 resultats max pour "${trimmedTitleQuery}".`);
          } else {
            setStatus('5 dernieres musiques chargees.');
          }
        } catch (error) {
          setStatus(`Erreur: ${error && error.message ? error.message : error}`, true);
        }
      }

      function searchByTitle() {
        const query = homeSearchInput ? homeSearchInput.value : '';
        void loadLatestMusiques(query);
      }

      document.addEventListener('DOMContentLoaded', () => {
        if (homeSearchButton) {
          homeSearchButton.addEventListener('click', searchByTitle);
        }

        if (homeSearchInput) {
          homeSearchInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
              event.preventDefault();
              searchByTitle();
            }
          });
        }

        if (homeResetButton) {
          homeResetButton.addEventListener('click', () => {
            if (homeSearchInput) {
              homeSearchInput.value = '';
            }
            void loadLatestMusiques('');
          });
        }

        void loadLatestMusiques();
      });
    </script>
  </body>
</html>
