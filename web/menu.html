<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Menu</title>
    <link rel="stylesheet" />
    <link rel="stylesheet" href="css/colors.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--background);
        position: static;
        top: auto;
      }

      .sidebar {
        height: 100vh;
      }

      nav {
        height: 100%;
      }

      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--background-menu);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 0 16px 16px 0;
        height: 100%;
      }

      .sidebar-link:hover,
      .sidebar-link.is-active {
        background: var(--background-selected);
        border-color: rgba(56, 189, 248, 0.7);
      }

      a {
        display: flex;
        align-items: center;
        gap: 2.5vw;
        text-decoration: none;
        color: #dbeafe;
        background: rgba(30, 41, 59, 0.45);
        transition: background 0.2s ease, border-color 0.2s ease;
        width: 100%;
        height: 100%;
        font-size: clamp(1rem, 4vw, 4rem);
        padding-left: 20px;
        padding-right: 20px;
      }

      .menu-icon {
        font-size: 1.3em; /* l'icône grandit avec le texte */
        width: 1.1rem;
        text-align: center;
        opacity: 0.95;
        margin-right:5px;
      }

      @media (max-width: 180px) {
          .menu-label {
              display: none;
          }

          a {
              justify-content: center;
              padding: 0;
          }

          .menu-icon {
              width: auto;
              font-size: 1.4em;
          }
      }

      
    </style>
  </head>
  <body>
    <aside class="sidebar" aria-label="Menu principal">
      <nav>
        <ul>
          <li><a href="#" class="sidebar-link is-active" data-tab="accueil"><span class="menu-icon" aria-hidden="true">&#8962;</span><span class="menu-label">Accueil</span></a></li>
          <li><a href="#" class="sidebar-link" data-tab="recherche"><span class="menu-icon" aria-hidden="true">&#128269;</span><span class="menu-label">Recherche</span></a></li>
          <li><a href="#" class="sidebar-link" data-tab="listes"><span class="menu-icon" aria-hidden="true">&#9835;</span><span class="menu-label">Listes</span></a></li>
          <li><a href="#" class="sidebar-link" data-tab="queue"><span class="menu-icon" aria-hidden="true">&#9654;&#9654;</span><span class="menu-label">Queue</span></a></li>
          <li><a href="#" class="sidebar-link" data-tab="artists"><span class="menu-icon" aria-hidden="true">&#127908;</span><span class="menu-label">Artistes</span></a></li>
          <li><a href="#" class="sidebar-link" data-tab="playlists"><span class="menu-icon" aria-hidden="true">&#9658;</span><span class="menu-label">Playlists</span></a></li>
          <li><a href="#" class="sidebar-link" data-tab="mes-playlists"><span class="menu-icon" aria-hidden="true">&#9829;</span><span class="menu-label">Mes Playlists</span></a></li>
          <li><a href="#" class="sidebar-link" data-tab="playlists-communaute"><span class="menu-icon" aria-hidden="true">&#127758;</span><span class="menu-label">Playlists de la communauté</span></a></li>
          <li><a href="#" class="sidebar-link" data-tab="albums"><span class="menu-icon" aria-hidden="true">&#128191;</span><span class="menu-label">Albums</span></a></li>
          <li><a href="#" class="sidebar-link" data-tab="parametres"><span class="menu-icon" aria-hidden="true">&#9881;</span><span class="menu-label">Paramètres</span></a></li>
        </ul>
      </nav>
    </aside>

    <script>
      const sidebarLinks = Array.from(document.querySelectorAll('.sidebar-link'));

      function setActiveTab(tab) {
        sidebarLinks.forEach((link) => {
          link.classList.toggle('is-active', (link.dataset.tab || '') === tab);
        });
      }

      sidebarLinks.forEach((link) => {
        link.addEventListener('click', (event) => {
          event.preventDefault();
          const tab = String(link.dataset.tab || 'accueil');
          setActiveTab(tab);
          window.parent.postMessage({ source: 'menu', type: 'MENU_TAB_SELECTED', tab }, '*');
        });
      });

      // Pour changer de tab
      /*window.addEventListener('message', (event) => {
        const message = event.data;
        if (!message || message.target !== 'menu') {
          return;
        }

        if (message.type === 'SET_ACTIVE_TAB') {
          setActiveTab(String(message.tab || 'accueil'));
        }
      });*/
    </script>
  </body>
</html>
