<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Accueil</title>
    <link rel="stylesheet" href="../../components/listMusic/listMusic.css" />
    <link rel="stylesheet" href="../../components/colors/colors.css" />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <main class="home-page">
      <div class="home-header">
        <h2>Dernieres musiques ajoutees</h2>
        <div class="home-search-row">
          <input id="homeSearchInput" class="home-search-input" type="text" placeholder="Rechercher un titre dans la table Musiques" />
          <button id="homeSearchButton" class="home-search-button" type="button">Rechercher</button>
          <button id="homeResetButton" class="home-reset-button" type="button">Reinitialiser</button>
        </div>
        <p id="homeStatus" class="home-status">Chargement...</p>
      </div>
      <ul id="homeResults" class="home-results"></ul>
      <p id="homeEmpty" class="home-empty" style="display: none;">Aucune musique en base.</p>
    </main>

    <script src="../../components/listMusic/listMusic.js"></script>
    <script src="home.js"></script>
  </body>
</html>
