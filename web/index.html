<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Music Player</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="css/colors.css" />
  </head>
  <body>
    <div class="app">
      <div class="app-shell">
        <section id="menu_liste" class="menu-frame-shell" aria-label="Menu principal">
          <iframe
            id="menuFrame"
            class="menu-frame"
            src="menu.html"
            title="Menu"
            loading="eager"
          ></iframe>
        </section>

        <main class="content">
          <section class="hero">
            <div class="hero-topbar">
              <h1>Lecteur musical</h1>
              <button id="logoutButton" type="button" class="logout-button">Se deconnecter</button>
            </div>
            <p>Parcourez votre bibliothèque locale et recherchez des titres via YouTube Music.</p>
            <div id="status" class="status">Chargement de la bibliothèque…</div>
          </section>

          <div class="layout">
            <section id="libraryPanel" class="panel is-hidden">
              <h2>Liste des musiques</h2>
              <iframe
                id="listFrame"
                class="search-frame"
                data-src="liste.html"
                title="Liste des musiques"
                loading="lazy"
              ></iframe>
            </section>

            <section id="queuePanel" class="panel is-hidden">
              <iframe
                id="queueFrame"
                class="search-frame"
                data-src="queue.html"
                title="Queue"
                loading="lazy"
              ></iframe>
            </section>

            <section id="searchPanel" class="panel is-hidden">
              <h2>Recherche YouTube Music</h2>
              <iframe
                id="searchFrame"
                class="search-frame"
                data-src="recherche.html"
                title="Recherche"
                loading="lazy"
              ></iframe>
            </section>

            <section id="artistsPanel" class="panel is-hidden">
              <h2>Artistes</h2>
              <iframe
                id="artistsFrame"
                class="search-frame"
                data-src="artistes.html"
                title="Artistes"
                loading="lazy"
              ></iframe>
            </section>

            <section id="albumsPanel" class="panel is-hidden">
              <h2>Albums</h2>
              <iframe
                id="albumsFrame"
                class="search-frame"
                data-src="albums.html"
                title="Albums"
                loading="lazy"
              ></iframe>
            </section>

            <section id="playlistsPanel" class="panel is-hidden">
              <h2>Playlists YouTube</h2>
              <iframe
                id="playlistsFrame"
                class="search-frame"
                data-src="playlists.html"
                title="Playlists"
                loading="lazy"
              ></iframe>
            </section>

            <section id="myPlaylistsPanel" class="panel is-hidden">
              <h2>Mes playlists</h2>
              <iframe
                id="myPlaylistsFrame"
                class="search-frame"
                data-src="listePlaylists.html"
                title="Mes playlists"
                loading="lazy"
              ></iframe>
            </section>

            <section id="settingsPanel" class="panel is-hidden">
              <h2>Parametres</h2>
              <iframe
                id="settingsFrame"
                class="search-frame"
                data-src="parametre.html"
                title="Parametres"
                loading="lazy"
              ></iframe>
            </section>
          </div>

          <section id="descriptionModal" class="description-modal is-hidden" aria-hidden="true">
            <div id="descriptionModalBackdrop" class="description-modal-backdrop"></div>
            <div class="description-modal-content" role="dialog" aria-modal="true" aria-label="Description musique">
              <button id="descriptionCloseButton" type="button" class="description-close-button">Fermer</button>
              <iframe
                id="descriptionFrame"
                class="description-frame"
                src="description.html"
                title="Description de la musique"
                loading="eager"
              ></iframe>
            </div>
          </section>
        </main>

        <section id="lecteur_musique" class="player-frame-shell">
            <iframe
              id="playerFrame"
              class="player-frame"
              src="lecteur.html"
              title="Lecteur audio"
              loading="eager"
            ></iframe>
          </section>

      </div>
    </div>

    <script src="js/musique_suivante.js"></script>
    <script src="js/lecteur.js"></script>
    <script src="js/recherche.js"></script>
    <script src="js/auth.js"></script>
    <script src="app.js"></script>
  </body>
</html>
